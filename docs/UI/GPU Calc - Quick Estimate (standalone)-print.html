<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Quick Estimate — GPU Calc (redesign)</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Red+Hat+Display:wght@400;500;600;700;900&family=Red+Hat+Text:wght@400;500;600;700&family=Red+Hat+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    /* Red Hat — core */
    --bg: #ffffff;
    --bg-2: #f2f2f2;        /* gray-10 */
    --bg-3: #e0e0e0;        /* gray-20 */
    --line: #e0e0e0;        /* gray-20 */
    --line-2: #c7c7c7;      /* gray-30 */
    --text: #151515;        /* gray-95 — ux black */
    --text-2: #4d4d4d;      /* gray-60 */
    --text-3: #707070;      /* gray-50 */
    --text-disabled: #8c8c8c; /* gray-45 */

    /* Red Hat red — used as POPS, not floods */
    --accent: #ee0000;       /* red-50 */
    --accent-rgb: 238, 0, 0;
    --accent-text: #ffffff;
    --accent-tint: #fce3e3;  /* red-10 */
    --accent-faintest: #fef0f0; /* red-05 */
    --accent-deep: #a60000;  /* red-60 */

    /* Highlight — the attention color on cost tile (same as accent, dominant) */
    --highlight: #ee0000;
    --highlight-rgb: 238, 0, 0;

    /* Secondary / status (used sparingly) */
    --info: #0066cc;          /* interaction-blue-50 */
    --success: #63993d;       /* success-green-50 */
    --warn: #ffcc17;          /* yellow-30 */
    --danger: #f0561d;        /* danger-orange-50 */

    --radius: 4px;            /* Red Hat UI prefers tighter radii */
    --radius-sm: 4px;
    --radius-lg: 8px;

    --display: "Red Hat Display", "Red Hat Text", ui-sans-serif, system-ui, sans-serif;
    --sans: "Red Hat Text", ui-sans-serif, system-ui, -apple-system, "Segoe UI", sans-serif;
    --mono: "Red Hat Mono", ui-monospace, "SF Mono", Menlo, monospace;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; background: var(--bg); color: var(--text); font-family: var(--sans); -webkit-font-smoothing: antialiased; }
  body { min-height: 100vh; }
  button { font-family: inherit; color: inherit; background: none; border: 0; cursor: pointer; padding: 0; }
  input { font-family: inherit; color: inherit; }
  a { color: inherit; }

  /* Ambient */
  .ambient { position: fixed; inset: 0; pointer-events: none; z-index: 0; overflow: hidden;
    background:
      radial-gradient(60% 50% at 78% 18%, rgba(var(--accent-rgb), 0.04), transparent 60%),
      radial-gradient(45% 45% at 14% 92%, rgba(var(--highlight-rgb), 0.04), transparent 60%);
  }
  .ambient::before {
    content: ""; position: absolute; inset: -2px;
    background-image:
      linear-gradient(rgba(15, 23, 42, 0.035) 1px, transparent 1px),
      linear-gradient(90deg, rgba(15, 23, 42, 0.035) 1px, transparent 1px);
    background-size: 56px 56px;
    mask-image: radial-gradient(ellipse 80% 60% at 50% 30%, #000 30%, transparent 75%);
    animation: drift 60s linear infinite;
  }
  @keyframes drift { to { background-position: 56px 56px, 56px 56px; } }

  /* Header */
  .topbar { position: relative; z-index: 2; display: flex; align-items: center; justify-content: space-between; padding: 16px 28px; border-bottom: 1px solid var(--line); background: rgba(255,255,255,0.92); backdrop-filter: blur(10px); }
  .brand { display: flex; align-items: center; gap: 12px; font-family: var(--display); font-weight: 700; font-size: 18px; letter-spacing: -0.005em; }
  .brand .mark { width: 28px; height: 22px; display: flex; align-items: center; justify-content: center; }
  .brand .mark svg { display: block; }
  .brand .wordmark { font-family: var(--display); font-weight: 700; }
  .brand .wordmark em { font-style: normal; color: var(--accent); }
  .nav { display: flex; gap: 2px; }
  .nav a { padding: 8px 14px; border-radius: 4px; color: var(--text-2); text-decoration: none; font-size: 14px; font-weight: 500; transition: color .15s, background .15s; white-space: nowrap; }
  .nav a:hover { color: var(--text); background: var(--bg-2); }
  .nav a.active { color: var(--text); background: var(--bg-2); }
  .nav a.active::before { content: ""; display: inline-block; width: 6px; height: 6px; background: var(--accent); margin-right: 8px; vertical-align: middle; }

  /* App layout */
  .app { position: relative; z-index: 1; display: grid; grid-template-columns: minmax(0, 1fr) 420px; gap: 0; min-height: calc(100vh - 65px); max-width: 1320px; margin: 0 auto; border-left: 1px solid var(--line); border-right: 1px solid var(--line); }
  .form-col { padding: 44px 52px 96px; min-width: 0; }
  .rail-col { position: sticky; top: 65px; height: calc(100vh - 65px); border-left: 1px solid var(--line); background: var(--bg-2); }

  /* Hero */
  .hero { margin-bottom: 48px; }
  .hero .kicker { display: inline-flex; align-items: center; gap: 8px; font-family: var(--mono); font-size: 11px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--text-3); margin-bottom: 14px; }
  .hero .kicker .dotpulse { width: 6px; height: 6px; border-radius: 50%; background: var(--accent); animation: pulse 1.6s ease-in-out infinite; }
  @keyframes pulse { 0%, 100% { opacity: 0.4; transform: scale(0.9); } 50% { opacity: 1; transform: scale(1.2); } }
  .hero h1 { font-family: var(--display); font-size: 44px; line-height: 1.02; letter-spacing: -0.02em; margin: 0 0 14px; font-weight: 500; }
  .hero h1 em { font-style: normal; color: var(--accent); font-weight: 700; }
  .hero p { font-size: 16px; color: var(--text-2); max-width: 560px; margin: 0; line-height: 1.55; }

  /* Section */
  .section { margin-bottom: 40px; position: relative; }
  .section-head { display: flex; flex-wrap: nowrap; align-items: baseline; gap: 14px; margin-bottom: 14px; }
  .section-num { font-family: var(--mono); font-size: 12px; color: var(--text-3); letter-spacing: 0.06em; min-width: 28px; flex-shrink: 0; }
  .section-title { font-family: var(--display); font-size: 24px; font-weight: 500; letter-spacing: -0.01em; flex: 1 1 auto; min-width: 0; }
  .section-status { margin-left: auto; font-family: var(--mono); font-size: 11px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--text-3); display: flex; align-items: center; gap: 6px; transition: color .25s; flex-shrink: 0; white-space: nowrap; }
  .section-status.done { color: var(--accent); }
  .section.next .section-num::after { content: ""; display: inline-block; width: 5px; height: 5px; border-radius: 50%; background: var(--accent); margin-left: 6px; vertical-align: middle; animation: pulse 1.6s ease-in-out infinite; }
  .section-help { color: var(--text-3); font-size: 13px; margin-bottom: 16px; }

  /* ============== Model marquee ============== */
  .marquee {
    position: relative;
    overflow: hidden;
    mask-image: linear-gradient(90deg, transparent, black 4%, black 96%, transparent);
    -webkit-mask-image: linear-gradient(90deg, transparent, black 4%, black 96%, transparent);
    padding: 6px 0;
  }
  .marquee-track { display: flex; gap: 10px; width: max-content; animation: marquee 70s linear infinite; }
  .marquee:hover .marquee-track,
  .marquee.paused .marquee-track { animation-play-state: paused; }
  @keyframes marquee { from { transform: translateX(0); } to { transform: translateX(calc(-100% / 3)); } }

  .mchip {
    position: relative;
    width: 180px;
    padding: 14px 14px 12px;
    background: var(--bg);
    border: 1px solid var(--line);
    border-radius: 4px;
    text-align: left;
    transition: transform .18s cubic-bezier(.3,1.3,.5,1), border-color .18s, box-shadow .18s;
    flex-shrink: 0;
    overflow: hidden;
  }
  .mchip:hover { transform: translateY(-2px); border-color: var(--text); box-shadow: 0 2px 0 var(--text); }
  .mchip.selected { border-color: var(--accent); box-shadow: 0 2px 0 var(--accent); background: var(--accent-faintest); }
  .mchip-vendor { font-family: var(--mono); font-size: 9.5px; color: var(--text-3); letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 4px; }
  .mchip-name { font-family: var(--display); font-size: 15px; font-weight: 500; letter-spacing: -0.005em; margin-bottom: 10px; }
  .mchip-foot { display: flex; align-items: center; justify-content: space-between; gap: 6px; }
  .mchip-size { font-family: var(--mono); font-size: 13px; color: var(--text); }
  .mchip-size .unit { color: var(--text-3); font-size: 11px; margin-left: 1px; }
  .mchip-tag { font-family: var(--mono); font-size: 9px; letter-spacing: 0.08em; text-transform: uppercase; padding: 2px 6px; border-radius: 999px; border: 1px solid var(--line-2); color: var(--text-2); }
  .mchip-tag.moe { color: #b45309; border-color: rgba(180,83,9,0.3); background: rgba(180,83,9,0.06); }
  .mchip-tag.new { color: var(--accent); border-color: rgba(var(--accent-rgb),0.3); background: rgba(var(--accent-rgb),0.04); }
  .mchip-tag.popular { color: #0369a1; border-color: rgba(3,105,161,0.3); background: rgba(3,105,161,0.06); }
  .mchip-tag.frontier { color: #7c3aed; border-color: rgba(124,58,237,0.3); background: rgba(124,58,237,0.06); }
  .mchip-tag.custom { color: #d97706; border-color: rgba(217,119,6,0.3); background: rgba(217,119,6,0.06); }
  .mchip.selected .mchip-name { color: var(--text); }
  .mchip:not(.selected):hover .mchip-name { color: var(--accent); }
  .mchip-check { position: absolute; top: 10px; right: 10px; display: flex; }
  .mchip.flash::before { content:""; position:absolute; inset:0; background: var(--accent); opacity: 0.16; animation: flash .4s ease-out forwards; pointer-events: none; }
  @keyframes flash { to { opacity: 0; } }

  .selected-pill {
    display: inline-flex; align-items: center; gap: 8px;
    margin-top: 12px;
    padding: 8px 14px;
    background: var(--accent-faint, rgba(var(--accent-rgb), 0.06));
    border: 1px solid rgba(var(--accent-rgb), 0.18);
    color: var(--text);
    border-radius: 999px;
    font-size: 13px;
    animation: pillin .35s cubic-bezier(.3,1.4,.5,1) backwards;
  }
  @keyframes pillin { from { transform: translateY(6px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
  .selected-pill strong { font-weight: 600; }
  .change-btn { font-size: 12px; color: var(--accent); margin-left: 4px; text-decoration: underline; text-decoration-color: rgba(var(--accent-rgb), 0.4); text-underline-offset: 2px; }
  .change-btn:hover { text-decoration-color: var(--accent); }

  /* ============== HuggingFace input ============== */
  .hf-row {
    margin-top: 14px;
    padding: 12px 14px;
    background: #FFFBEA;
    border: 1px solid #FDE68A;
    border-radius: 4px;
    transition: border-color .2s, box-shadow .2s, background .2s;
  }
  .hf-row.active { border-color: var(--accent); background: var(--accent-faintest); }
  .hf-top { display: grid; grid-template-columns: auto 1fr auto auto; gap: 12px; align-items: center; }
  .hf-logo { display: flex; align-items: center; justify-content: center; }
  .hf-fieldwrap { display: flex; flex-direction: column; min-width: 0; }
  .hf-label { font-family: var(--mono); font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--text-3); margin-bottom: 2px; }
  .hf-input { width: 100%; border: 0; background: transparent; padding: 2px 0; font-family: var(--mono); font-size: 14px; outline: none; color: var(--text); }
  .hf-input::placeholder { color: var(--text-3); }
  .hf-load { background: var(--text); color: white; padding: 8px 16px; border-radius: 4px; font-family: var(--display); font-size: 13px; font-weight: 600; letter-spacing: 0.01em; transition: opacity .15s, background .15s; }
  .hf-load:hover:not(:disabled) { background: var(--accent); }
  .hf-load:disabled { opacity: 0.4; cursor: not-allowed; }
  .hf-link { display: inline-flex; align-items: center; gap: 4px; font-size: 12px; color: var(--text-3); text-decoration: none; padding: 6px 10px; border-radius: 6px; transition: color .15s, background .15s; white-space: nowrap; }
  .hf-link:hover { color: var(--text-2); background: rgba(15,23,42,0.04); }

  /* HF token row */
  .hf-token-row { margin-top: 10px; padding-top: 10px; border-top: 1px dashed rgba(180,140,0,0.25); }
  .hf-token-toggle {
    display: inline-flex; align-items: center; gap: 6px;
    font-size: 12px;
    color: var(--text-2);
    padding: 4px 8px;
    border-radius: 4px;
    transition: color .15s, background .15s;
  }
  .hf-token-toggle:hover { color: var(--text); background: rgba(15,23,42,0.04); }
  .hf-token-toggle .hf-token-hint { color: var(--text-3); font-family: var(--mono); font-size: 10.5px; margin-left: 2px; }
  .hf-token-field {
    margin-top: 10px;
    display: grid;
    grid-template-columns: 1fr auto auto;
    gap: 10px;
    align-items: center;
    padding: 8px 12px;
    background: var(--bg);
    border: 1px solid var(--line);
    border-radius: 4px;
  }
  .hf-token-input { font-family: var(--mono); font-size: 13px; padding: 4px 0; letter-spacing: 0.02em; }
  .hf-eye {
    width: 28px; height: 28px;
    display: flex; align-items: center; justify-content: center;
    color: var(--text-3);
    border-radius: 4px;
    transition: color .15s, background .15s;
  }
  .hf-eye:hover { color: var(--text); background: var(--bg-2); }
  .hf-link.sm { font-size: 11px; padding: 4px 8px; }
  .hf-token-note {
    margin-top: 8px;
    display: inline-flex; align-items: center; gap: 6px;
    font-family: var(--mono);
    font-size: 10.5px;
    color: var(--text-3);
    padding: 4px 0;
  }

  /* ============== Load row ============== */
  .load-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

  .load-tile {
    background: var(--bg);
    border: 1px solid var(--line);
    border-radius: 6px;
    overflow: hidden;
    transition: border-color .2s, box-shadow .2s;
  }
  .load-tile.empty { border-style: dashed; }
  .load-tile.expanded { border-color: var(--accent); }
  .load-tile-head {
    width: 100%;
    display: flex; align-items: center; gap: 12px;
    padding: 14px 16px;
    text-align: left;
    transition: background .15s;
  }
  .load-tile-head:hover { background: var(--bg-2); }
  .load-tile-icon {
    width: 36px; height: 36px;
    border-radius: 8px;
    background: var(--bg-3);
    display: flex; align-items: center; justify-content: center;
    color: var(--text-2);
    transition: background .2s, color .2s;
    flex-shrink: 0;
  }
  .load-tile.expanded .load-tile-icon,
  .load-tile-head:hover .load-tile-icon {
    background: rgba(var(--accent-rgb), 0.10); color: var(--accent);
  }
  .load-tile-text { flex: 1; min-width: 0; }
  .load-tile-label { font-family: var(--mono); font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--text-3); margin-bottom: 2px; }
  .load-tile-value { font-family: var(--display); font-size: 18px; font-weight: 500; letter-spacing: -0.005em; }
  .load-tile-value .load-tile-desc { font-weight: 400; color: var(--text-3); font-size: 13px; margin-left: 2px; }
  .load-tile.empty .load-tile-value { color: var(--text-3); font-weight: 500; }
  .load-tile-pencil {
    width: 28px; height: 28px;
    display: flex; align-items: center; justify-content: center;
    color: var(--text-3);
    border-radius: 6px;
    background: var(--bg-3);
    transition: color .15s, background .15s, transform .15s;
  }
  .load-tile-head:hover .load-tile-pencil { color: var(--accent); background: rgba(var(--accent-rgb), 0.10); }
  .load-tile.expanded .load-tile-pencil { color: var(--accent); background: rgba(var(--accent-rgb), 0.12); transform: rotate(-12deg); }

  .load-tile-body { display: grid; grid-template-rows: 0fr; transition: grid-template-rows .35s cubic-bezier(.4,.8,.4,1); }
  .load-tile-body[data-open="true"] { grid-template-rows: 1fr; }
  .load-tile-body-inner { overflow: hidden; min-height: 0; padding: 0 16px 16px; }
  .load-tile.expanded .load-tile-body { grid-template-rows: 1fr; }

  /* Chip row */
  .chip-row { display: flex; flex-wrap: wrap; gap: 6px; padding-top: 4px; border-top: 1px dashed var(--line); padding-top: 14px; margin-top: 4px; }
  .chip {
    flex: 1 1 auto; min-width: 70px;
    padding: 9px 10px;
    border: 1px solid var(--line);
    background: var(--bg);
    border-radius: 4px;
    text-align: center;
    transition: border-color .15s, background .15s, color .15s;
    display: flex; flex-direction: column; gap: 2px;
  }
  .chip:hover { border-color: var(--text); }
  .chip-big { font-family: var(--mono); font-size: 14px; color: var(--text); font-weight: 500; }
  .chip-small { font-size: 10.5px; color: var(--text-3); }
  .chip.active { border-color: var(--accent); background: var(--accent-faintest); }
  .chip.active .chip-big { color: var(--accent); font-weight: 600; }
  .chip-bars { display: flex; gap: 2px; justify-content: center; margin-top: 4px; }
  .chip-bars .b { width: 8px; height: 3px; border-radius: 1.5px; background: var(--line); }
  .chip-bars .b.on { background: var(--text-3); }
  .chip.active .chip-bars .b.on { background: var(--accent); }

  .users-extra { display: flex; align-items: center; gap: 12px; margin-top: 12px; }
  .users-extra label { font-size: 12px; color: var(--text-3); }
  .users-extra input { flex: 1; padding: 8px 12px; background: var(--bg-2); border: 1px solid var(--line); border-radius: 8px; font-family: var(--mono); font-size: 13px; outline: none; transition: border-color .15s; }
  .users-extra input:focus { border-color: var(--accent); }

  /* ============== Form foot + CTA ============== */
  .formfoot { margin-top: 32px; display: flex; align-items: center; justify-content: space-between; gap: 16px; padding-top: 24px; border-top: 1px dashed var(--line); }
  .formfoot .summary { font-size: 13px; color: var(--text-3); font-family: var(--mono); display: flex; align-items: center; gap: 6px; }
  .cta {
    position: relative;
    padding: 12px 22px;
    border-radius: 4px;
    background: var(--accent);
    color: var(--accent-text);
    font-family: var(--display);
    font-weight: 600;
    font-size: 14px;
    letter-spacing: 0.01em;
    display: inline-flex; align-items: center; gap: 8px;
    transition: transform .15s, box-shadow .2s, opacity .2s, background .15s;
    overflow: hidden;
  }
  .cta:hover:not(:disabled) { background: var(--accent-deep); transform: translateY(-1px); box-shadow: 0 8px 22px rgba(var(--accent-rgb), 0.30); }
  .cta:disabled { opacity: 0.4; cursor: not-allowed; background: var(--bg-3); color: var(--text-3); }
  .cta:not(:disabled)::after { content:""; position:absolute; top:0; left:-120%; width:50%; height:100%; background: linear-gradient(90deg, transparent, rgba(255,255,255,0.25), transparent); animation: sheen 3.6s ease-in-out infinite; pointer-events:none; }
  @keyframes sheen { 0%, 100% { left:-120%; } 50% { left:220%; } }

  /* ============== Rail ============== */
  .rail-inner { padding: 24px 20px 32px; height: 100%; overflow-y: auto; display: flex; flex-direction: column; gap: 16px; }
  .rail-head { display: flex; align-items: center; justify-content: space-between; }
  .rail-head .label { font-family: var(--mono); font-size: 10.5px; letter-spacing: 0.16em; text-transform: uppercase; color: var(--text-3); display: flex; align-items: center; gap: 8px; }
  .rail-head .label .live { width: 6px; height: 6px; border-radius: 50%; background: var(--highlight); animation: pulse 1.6s ease-in-out infinite; }
  .rail-head .ts { font-family: var(--mono); font-size: 10.5px; color: var(--text-3); }

  /* Empty state */
  .empty { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; text-align: center; padding: 24px; color: var(--text-3); }
  .empty .ring { width: 86px; height: 86px; border-radius: 50%; border: 1px dashed var(--line-2); display: flex; align-items: center; justify-content: center; margin-bottom: 22px; position: relative; color: var(--accent); }
  .empty .ring::before, .empty .ring::after { content: ""; position: absolute; inset: -1px; border-radius: 50%; border: 1px solid var(--accent); opacity: 0; animation: ringpulse 2.4s ease-out infinite; }
  .empty .ring::after { animation-delay: 1.2s; opacity: 0; }
  @keyframes ringpulse { 0% { opacity: 0.5; transform: scale(0.9); } 100% { opacity: 0; transform: scale(1.4); } }
  .empty h3 { font-size: 16px; color: var(--text-2); margin: 0 0 6px; font-weight: 500; }
  .empty p { font-size: 13px; max-width: 240px; line-height: 1.5; margin: 0; }

  /* ============== Flip card ============== */
  .flip { perspective: 1000px; cursor: pointer; position: relative; }
  .flip-inner { position: relative; }
  .flip-face {
    border-radius: 6px;
    background: var(--bg);
    border: 1px solid var(--line);
    padding: 16px;
    transition: opacity .25s ease, transform .45s cubic-bezier(.4,.8,.4,1);
    will-change: opacity, transform;
  }
  .flip-front { position: relative; opacity: 1; transform: rotateY(0); }
  .flip-back { position: absolute; inset: 0; opacity: 0; transform: rotateY(180deg); pointer-events: none; display: flex; flex-direction: column; }
  .flip.flipped .flip-front { opacity: 0; transform: rotateY(-180deg); pointer-events: none; transition-delay: 0s, 0s; }
  .flip.flipped .flip-back { opacity: 1; transform: rotateY(0); pointer-events: auto; transition-delay: .1s, 0s; }
  .flip-hint { position: absolute; bottom: 8px; right: 10px; font-family: var(--mono); font-size: 9.5px; letter-spacing: 0.06em; text-transform: uppercase; color: var(--text-3); opacity: 0.55; display: inline-flex; align-items: center; gap: 4px; }
  .flip:hover .flip-hint { opacity: 0.9; }
  .flip:hover .flip-face { box-shadow: 0 6px 22px rgba(15,23,42,0.06); }

  /* Hero stat — highlight color */
  .stat-hero .flip-face { background: var(--highlight); background-image: linear-gradient(135deg, rgba(255,255,255,0.10) 0%, rgba(0,0,0,0.18) 100%); border-color: transparent; color: white; padding: 18px 18px 22px; min-height: 130px; }
  .stat-hero .slabel { display: flex; align-items: center; gap: 6px; font-family: var(--mono); font-size: 10.5px; letter-spacing: 0.14em; text-transform: uppercase; color: rgba(255,255,255,0.78); margin-bottom: 8px; }
  .stat-hero .slabel .deploy-toggle { margin-left: auto; }
  .stat-hero .sval { font-family: var(--mono); font-size: 36px; font-weight: 600; letter-spacing: -0.02em; line-height: 1; display: flex; align-items: baseline; }
  .stat-hero .sval .currency { font-size: 20px; opacity: 0.7; margin-right: 4px; font-weight: 500; }
  .stat-hero .strend { font-family: var(--mono); font-size: 11px; color: rgba(255,255,255,0.78); margin-top: 10px; }
  .stat-hero .flip-back { background: var(--text); color: white; border-color: var(--text); padding: 18px; }
  .stat-hero .flip-hint { color: rgba(255,255,255,0.55); }
  .stat-hero:hover .flip-hint { color: rgba(255,255,255,0.85); }
  .deploy-toggle {
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: white;
    background: rgba(255,255,255,0.18);
    padding: 4px 8px;
    border-radius: 999px;
    transition: background .15s;
  }
  .deploy-toggle:hover { background: rgba(255,255,255,0.28); }

  /* Stats row — GPUs + VRAM tiles */
  .stats-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .stat-small .flip-face { min-height: 100px; }
  .stat-small .slabel { display: flex; align-items: center; gap: 6px; font-family: var(--mono); font-size: 10px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--text-3); margin-bottom: 8px; }
  .stat-small .sval { font-family: var(--mono); font-size: 22px; font-weight: 500; letter-spacing: -0.01em; line-height: 1; display: flex; align-items: baseline; gap: 4px; }
  .stat-small .sval .unit { color: var(--text-3); font-size: 11px; font-weight: 400; }
  .stat-small .strend { font-size: 11px; color: var(--text-3); margin-top: 6px; }

  /* Backs */
  .back-title { font-family: var(--mono); font-size: 10px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--text-3); margin-bottom: 10px; }
  .stat-hero .back-title { color: rgba(255,255,255,0.55); }
  .back-formula { display: flex; flex-direction: column; gap: 4px; font-family: var(--mono); font-size: 13px; line-height: 1.5; color: var(--text); }
  .stat-hero .back-formula { color: white; font-size: 14px; }
  .back-formula.small { font-size: 11.5px; }
  .back-formula .line { display: block; }
  .back-formula .line.indent { padding-left: 16px; }
  .back-formula .line.eq { margin-top: 4px; padding-top: 6px; border-top: 1px dashed rgba(15,23,42,0.12); }
  .stat-hero .back-formula .line.eq { border-top-color: rgba(255,255,255,0.25); }
  .back-formula .t { color: var(--accent); font-weight: 500; }
  .stat-hero .back-formula .t { color: #f9a8a8; font-weight: 500; }
  .back-formula strong { font-weight: 600; }
  .back-note { font-family: var(--mono); font-size: 10.5px; color: var(--text-3); margin-top: auto; padding-top: 10px; display: flex; flex-wrap: wrap; gap: 8px; }
  .stat-hero .back-note { color: rgba(255,255,255,0.55); }

  /* GPU block flip */
  .gpu-block .flip-face { padding: 14px; min-height: 220px; }
  .gpu-block-head { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 10px; gap: 10px; }
  .gpu-block-title { font-family: var(--mono); font-size: 10.5px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--text-3); }
  .gpu-block-meta { font-family: var(--mono); font-size: 11px; color: var(--text-2); }
  .gpus { display: flex; flex-direction: column; gap: 4px; }
  .gpu { padding: 0; }
  .memgrid { display: grid; grid-template-columns: repeat(20, 1fr); gap: 2px; }
  .memcell { aspect-ratio: 1; background: var(--bg-3); border-radius: 2px; transition: background .35s cubic-bezier(.4,1,.5,1); }
  .memcell.model { background: var(--accent); }
  .memcell.kv { background: rgba(var(--accent-rgb),0.35); }
  .gpu-more { font-family: var(--mono); font-size: 10px; color: var(--text-3); text-align: center; padding: 4px; }
  .memlegend { display: flex; flex-wrap: wrap; gap: 6px 12px; margin-top: 10px; font-family: var(--mono); font-size: 10px; color: var(--text-3); }
  .memlegend span { white-space: nowrap; }
  .memlegend .sw { display: inline-block; width: 9px; height: 9px; border-radius: 2px; margin-right: 5px; vertical-align: -1px; }
  .memlegend .sw.model { background: var(--accent); }
  .memlegend .sw.kv { background: rgba(var(--accent-rgb),0.35); }
  .memlegend .sw.free { background: var(--bg-3); border: 1px solid var(--line-2); }

  /* Ticker digit roll */
  .ticker { display: inline-flex; }
  .ticker .digit, .ticker .sep { display: inline-block; overflow: hidden; height: 1em; line-height: 1; vertical-align: bottom; }
  .ticker .digit .col { display: flex; flex-direction: column; transition: transform .55s cubic-bezier(.4,1,.4,1); }
  .ticker .digit span { height: 1em; line-height: 1; }

  /* Scrollbar */
  .rail-inner::-webkit-scrollbar { width: 8px; }
  .rail-inner::-webkit-scrollbar-thumb { background: var(--line); border-radius: 4px; }
  .rail-inner::-webkit-scrollbar-thumb:hover { background: var(--line-2); }

  @media (max-width: 860px) {
    .app { grid-template-columns: 1fr; }
    .rail-col { position: static; height: auto; border-left: 0; border-top: 1px solid var(--line); }
    .nav { display: none; }
    .form-col { padding: 32px 22px 64px; }
  }

  /* ============== Print ============== */
  @media print {
    @page { size: A4; margin: 14mm 12mm; }
    html, body { background: white !important; color: var(--text) !important; }
    .ambient, .topbar, .formfoot, .twk-panel, .twk-fab, .marquee, .hf-row, .section.next .section-num::after,
    .hero .kicker .dotpulse, .rail-head .label .live, .selected-pill .change-btn, .flip-hint, .deploy-toggle,
    .load-tile-pencil { display: none !important; }
    .app { display: block !important; max-width: none !important; border: 0 !important; margin: 0 !important; }
    .form-col { padding: 0 !important; max-width: none !important; }
    .rail-col { position: static !important; height: auto !important; border: 0 !important; background: white !important; break-before: page; }
    .rail-inner { padding: 0 !important; overflow: visible !important; height: auto !important; gap: 14px !important; }
    .hero { margin-bottom: 22px !important; }
    .hero h1 { font-size: 28px !important; }
    .hero p { font-size: 13px !important; }
    .section { margin-bottom: 22px !important; break-inside: avoid; }
    .section-title { font-size: 18px !important; }
    .load-tile-body, .load-tile-body[data-open="true"] { grid-template-rows: 1fr !important; }
    .load-tile-body-inner { padding: 0 14px 12px !important; }
    .load-tile { break-inside: avoid; }
    /* Surface the selected model summary as a print-only block */
    .selected-pill { display: inline-flex !important; }
    /* Open all sections, freeze animations */
    *, *::before, *::after { animation: none !important; transition: none !important; }
    /* Flip cards: show front only when not flipped, force visible */
    .flip-front { opacity: 1 !important; transform: none !important; }
    .flip-back { display: none !important; }
    /* Print the cost tile red for impact */
    .stat-hero .flip-face { background: var(--accent) !important; color: white !important; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
    .stat-hero .slabel, .stat-hero .strend { color: rgba(255,255,255,0.85) !important; }
    /* Force print of all backgrounds/colors */
    .memcell.model, .memcell.kv, .accent, .selected-pill, .mchip.selected,
    .chip.active, .stat-hero .flip-face, .cta { -webkit-print-color-adjust: exact; print-color-adjust: exact; }
    .memcell { aspect-ratio: 1; }
    /* Print summary block (auto-injected) */
    .print-only { display: block !important; }
    .stats-row, .gpu-block { break-inside: avoid; }
    .formfoot { display: none !important; }
    /* Memory grid cells: make borders visible since we can't rely on bg */
    .memcell { border: 0.5px solid #e0e0e0; }
    .memcell.model { background: #ee0000 !important; border-color: #ee0000; }
    .memcell.kv { background: #fce3e3 !important; border-color: #fce3e3; }
  }
  .print-only { display: none; }
  @media print { .print-only { display: block !important; } }
</style>
</head>
<body>
<div class="ambient"></div>

<header class="topbar">
  <div class="brand">
    <span class="mark" aria-hidden="true">
      <svg width="28" height="22" viewBox="0 0 36 28" fill="none" xmlns="http://www.w3.org/2000/svg">
        <!-- Stylized fedora silhouette (not the Red Hat trademark; a generic mark in Red Hat red) -->
        <ellipse cx="18" cy="21" rx="17" ry="3" fill="#ee0000"/>
        <path d="M4 21 C 6 11, 11 5, 18 5 C 25 5, 30 11, 32 21 Z" fill="#ee0000"/>
        <ellipse cx="18" cy="18.5" rx="15" ry="1.4" fill="#a60000" opacity="0.6"/>
      </svg>
    </span>
    <span class="wordmark">GPU<em>Calc</em></span>
  </div>
  <nav class="nav">
    <a href="#">Home</a>
    <a href="#" class="active">Quick Estimate</a>
    <a href="#">Advanced</a>
    <a href="#">Explorer</a>
    <a href="#">Hybrid Savings</a>
    <a href="#">Routing</a>
  </nav>
  <div style="font-family: var(--mono); font-size: 12px; color: var(--text-3);">v0.5 · redesign</div>
</header>

<div id="root"></div>

<template id="__bundler_thumbnail" data-bg-color="#ffffff">
  <svg viewBox="0 0 1200 800" xmlns="http://www.w3.org/2000/svg">
    <rect width="1200" height="800" fill="#ffffff"/>
    <g transform="translate(600 400)">
      <ellipse cx="0" cy="80" rx="280" ry="40" fill="#ee0000"/>
      <path d="M-240 80 C -220 -90, -120 -180, 0 -180 C 120 -180, 220 -90, 240 80 Z" fill="#ee0000"/>
      <ellipse cx="0" cy="55" rx="240" ry="22" fill="#a60000" opacity="0.55"/>
    </g>
    <text x="600" y="650" text-anchor="middle" font-family="'Red Hat Display', system-ui, sans-serif" font-size="64" font-weight="700" fill="#151515">GPU<tspan fill="#ee0000">Calc</tspan></text>
  </svg>
</template>

<script type="application/json" id="speaker-notes">[]</script>
<script>
  // Pre-fill defaults so the printed page shows a meaningful estimate.
  // The app reads from localStorage where relevant; otherwise we drive
  // the UI after mount by clicking the right model + users preset.
  window.__PRINT_MODE = true;
</script>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script type="text/babel" src="tweaks-panel.jsx"></script>
<script type="text/babel" src="gpu-calc.jsx"></script>
<script type="text/babel">
  // Print-mode bootstrap: pre-select a model + users so the print
  // has data, wait for fonts + React commit, then trigger window.print().
  (async () => {
    if (!window.__PRINT_MODE) return;
    const sleep = (ms) => new Promise(r => setTimeout(r, ms));
    // Wait for fonts
    try { await document.fonts.ready; } catch (e) {}
    // Wait for first React render
    for (let i = 0; i < 30; i++) {
      if (document.querySelector('.marquee')) break;
      await sleep(100);
    }
    await sleep(150);
    // Pause marquee, pick Llama 3 70B
    const track = document.querySelector('.marquee-track');
    if (track) track.style.animationPlayState = 'paused';
    const chips = [...document.querySelectorAll('.mchip')];
    const target = chips.find(c => c.querySelector('.mchip-name')?.innerText === 'Llama 3 70B') || chips[0];
    target?.click();
    await sleep(250);
    // Open users tile, pick 100, close
    const tileBtns = document.querySelectorAll('.load-tile-head');
    tileBtns[0]?.click();
    await sleep(200);
    const userChips = [...document.querySelectorAll('.load-tile.expanded .chip')];
    (userChips.find(c => c.querySelector('.chip-big')?.innerText === '100') || userChips[2])?.click();
    await sleep(150);
    tileBtns[0]?.click(); // collapse
    await sleep(300);
    // Scroll to top, then print
    window.scrollTo(0, 0);
    await sleep(500);
    window.print();
  })();
</script>
</body>
</html>
