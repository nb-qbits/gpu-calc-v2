<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Font comparison — Quick Estimate tiles</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700&family=Geist+Mono:wght@400;500;600&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&family=Plus+Jakarta+Sans:wght@400;500;600;700&family=Manrope:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&family=DM+Sans:wght@400;500;600&family=DM+Mono:wght@400;500&family=Space+Grotesk:wght@400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root{
    --t:#151515;--t2:#3c3f42;--t3:#54585c;--bg:#fff;--bg2:#f5f5f5;--bg3:#e0e0e0;
    --line:#d2d2d2;--line2:#b8bbbe;--blue:#0066cc;--c-purple:#5752d1;
  }
  *{box-sizing:border-box}
  body{margin:0;background:#ececed;color:var(--t);font-family:"Geist",system-ui,sans-serif;-webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale;text-rendering:optimizeLegibility;padding:32px}
  h1{font-size:22px;font-weight:700;margin:0 0 4px}
  .lede{color:var(--t2);font-size:14px;margin:0 0 24px}
  .grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:20px;max-width:1500px;margin:0 auto}
  @media(min-width:1200px){.grid{grid-template-columns:repeat(3,minmax(0,1fr))}}

  .demo{background:var(--bg);border:1px solid var(--line);border-radius:10px;overflow:hidden}
  .demo-hd{display:flex;align-items:baseline;justify-content:space-between;gap:8px;padding:14px 16px;border-bottom:1px solid var(--line);background:var(--bg2)}
  .demo-name{font-weight:700;font-size:15px}
  .demo-meta{font-size:11px;color:var(--t3)}
  .demo-body{padding:16px}

  /* these inherit --sans/--mono set per-demo */
  .d-title{font-family:var(--sans);font-size:24px;font-weight:600;letter-spacing:-.01em;margin:0 0 2px}
  .d-sub{font-family:var(--sans);font-size:13px;color:var(--t2);margin:0 0 16px}

  .tiles{display:grid;grid-template-columns:1.3fr 1fr;gap:10px}
  .tile{border:1px solid var(--line);border-radius:8px;padding:14px;display:flex;flex-direction:column;min-height:120px}
  .tile.dark{background:#151515;border-color:#151515;color:#fff}
  .t-label{font-family:var(--mono);font-size:12px;font-weight:500;letter-spacing:.05em;text-transform:uppercase;color:var(--t2)}
  .tile.dark .t-label{color:rgba(255,255,255,.82)}
  .t-val{font-family:var(--sans);font-weight:var(--nw,700);letter-spacing:-.01em;line-height:1;margin-top:auto;font-size:38px}
  .tile.dark .t-val{font-size:52px}
  .t-unit{font-size:.4em;font-weight:600;color:var(--t3);margin-left:5px}
  .tile.dark .t-unit{color:rgba(255,255,255,.7)}
  .t-sub{font-family:var(--sans);font-size:12.5px;color:var(--t2);margin-top:8px}
  .tile.dark .t-sub{color:rgba(255,255,255,.78)}
  .t-chip{font-family:var(--mono);font-size:11.5px;font-weight:600;color:var(--c-purple);background:rgba(87,82,209,.12);padding:2px 7px;border-radius:4px;margin-top:8px;display:inline-block;width:fit-content}
  .d-mono{font-family:var(--mono);font-size:13px;color:var(--t2);margin-top:14px}
  .d-mono b{color:var(--t)}
</style>
</head>
<body>
<h1>Font comparison — same tiles, six modern pairings</h1>
<p class="lede">Each card renders the identical Quick Estimate UI in a different sans + mono pairing. Big numbers &amp; titles use the sans; uppercase labels and values use the mono.</p>

<div class="grid" id="grid"></div>

<script>
  const PAIRS = [
    { name:"Geist", meta:"Geist + Geist Mono", sans:'"Geist"', mono:'"Geist Mono"', nw:700, note:"Sharp, current, Vercel" },
    { name:"Inter", meta:"Inter + JetBrains Mono", sans:'"Inter"', mono:'"JetBrains Mono"', nw:700, note:"Neutral, bulletproof" },
    { name:"Plus Jakarta Sans", meta:"Jakarta + JetBrains Mono", sans:'"Plus Jakarta Sans"', mono:'"JetBrains Mono"', nw:700, note:"Geometric, designed" },
    { name:"Manrope", meta:"Manrope + IBM Plex Mono", sans:'"Manrope"', mono:'"IBM Plex Mono"', nw:700, note:"Semi-rounded, friendly" },
    { name:"DM Sans", meta:"DM Sans + DM Mono", sans:'"DM Sans"', mono:'"DM Mono"', nw:600, note:"Warm, geometric (gpuinfer)" },
    { name:"Space Grotesk", meta:"Space Grotesk + Space Mono", sans:'"Space Grotesk"', mono:'"Space Mono"', nw:600, note:"Techy, opinionated" },
  ];

  const grid = document.getElementById('grid');
  PAIRS.forEach(p => {
    const el = document.createElement('div');
    el.className = 'demo';
    el.style.setProperty('--sans', p.sans + ',system-ui,sans-serif');
    el.style.setProperty('--mono', p.mono + ',ui-monospace,monospace');
    el.style.setProperty('--nw', p.nw);
    el.innerHTML = `
      <div class="demo-hd">
        <span class="demo-name">${p.name}</span>
        <span class="demo-meta">${p.meta} · ${p.note}</span>
      </div>
      <div class="demo-body">
        <h2 class="d-title">Quick estimate</h2>
        <p class="d-sub">Start with just a model name. We fill the rest.</p>
        <div class="tiles">
          <div class="tile dark">
            <span class="t-label">GPUs required</span>
            <span class="t-val">1<span class="t-unit">× H100</span></span>
            <span class="t-sub">Range 1–2 · 87 active requests</span>
          </div>
          <div class="tile">
            <span class="t-label">KV cache / req</span>
            <span class="t-val">19<span class="t-unit">MB</span></span>
            <span class="t-chip">GQA · 4× smaller</span>
          </div>
        </div>
        <div class="d-mono">$1,818 / mo · 16 GB weights · 8B × 2 = <b>16 GB</b></div>
      </div>`;
    grid.appendChild(el);
  });
</script>
</body>
</html>
