<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Quick Estimate · gpu.calc</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Red+Hat+Display:wght@400;500;700&family=Red+Hat+Text:wght@400;500;700&family=Red+Hat+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    /* PatternFly / Red Hat console */
    --bg: #ffffff;
    --bg-shell: #f0f0f0;
    --bg-2: #f5f5f5;
    --bg-3: #e0e0e0;
    --line: #d2d2d2;
    --line-2: #b8b8b8;
    --text: #151515;
    --text-2: #4d4d4d;
    --text-3: #6a6e73;

    --link: #0066cc;
    --link-hover: #004080;
    --action: #0066cc;
    --action-hover: #004080;
    --action-text: #fff;

    --brand-red: #ee0000;       /* logo only */
    --brand-red-deep: #a60000;

    /* PatternFly chart palette (from Cost Explorer slide) */
    --c-blue:    #0066cc;
    --c-gold:    #f0ab00;
    --c-green:   #3e8635;
    --c-purple:  #5e40be;
    --c-orange:  #b8390e;
    --c-teal:    #009596;
    --c-cyan:    #2b9af3;

    --success: #3e8635;
    --success-bg: #f3faf2;
    --warn: #f0ab00;
    --warn-bg: #fdf7e7;
    --info: #2b9af3;
    --info-bg: #e7f1fa;
    --danger: #c9190b;
    --danger-bg: #faeae8;

    --radius: 4px;
    --display: "Red Hat Display", system-ui, sans-serif;
    --sans: "Red Hat Text", system-ui, sans-serif;
    --mono: "Red Hat Mono", ui-monospace, "SF Mono", Menlo, monospace;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; background: var(--bg-shell); color: var(--text); font-family: var(--sans); font-size: 14px; -webkit-font-smoothing: antialiased; }
  button { font-family: inherit; color: inherit; background: none; border: 0; cursor: pointer; padding: 0; }
  input, select { font-family: inherit; color: inherit; }
  a { color: var(--link); text-decoration: none; }
  a:hover { text-decoration: underline; color: var(--link-hover); }

  /* ============== Topbar ============== */
  .topbar { height: 60px; background: #151515; color: #fff; display: flex; align-items: center; padding: 0 16px; gap: 14px; position: sticky; top: 0; z-index: 30; }
  .topbar .menu { width: 36px; height: 36px; display: flex; align-items: center; justify-content: center; color: #d2d2d2; border-radius: var(--radius); }
  .topbar .menu:hover { background: rgba(255,255,255,0.08); color: #fff; }
  .topbar .brand { display: flex; align-items: center; gap: 10px; padding: 0 8px 0 4px; }
  .topbar .brand .fedora { width: 32px; height: 24px; display: flex; }
  .topbar .brand .wordmark { font-family: var(--display); font-weight: 500; font-size: 17px; }
  .topbar .brand .wordmark em { font-style: normal; font-weight: 700; color: var(--brand-red); }
  .topbar .spacer { flex: 1; }
  .topbar .iconbtn { width: 36px; height: 36px; display: flex; align-items: center; justify-content: center; border-radius: var(--radius); color: #d2d2d2; position: relative; }
  .topbar .iconbtn:hover { background: rgba(255,255,255,0.08); color: #fff; }
  .topbar .iconbtn .badge { position: absolute; top: 6px; right: 6px; min-width: 16px; height: 16px; padding: 0 4px; background: var(--brand-red); border-radius: 999px; font-family: var(--mono); font-size: 10px; font-weight: 600; display: flex; align-items: center; justify-content: center; }
  .topbar .user { display: flex; align-items: center; gap: 6px; padding: 0 10px; height: 36px; border-radius: var(--radius); color: #fff; font-size: 13px; }
  .topbar .user:hover { background: rgba(255,255,255,0.08); }

  /* ============== Shell ============== */
  .shell { display: grid; grid-template-columns: 232px 1fr; min-height: calc(100vh - 60px); }
  .sidebar { background: #212427; color: #d2d2d2; padding: 12px 0 24px; border-right: 1px solid #151515; }
  .sidebar .navgroup { margin-bottom: 4px; }
  .sidebar .nav-item { display: flex; align-items: center; padding: 9px 16px 9px 20px; font-size: 14px; color: #d2d2d2; cursor: pointer; user-select: none; gap: 10px; }
  .sidebar .nav-item .ic { width: 14px; height: 14px; display: flex; align-items: center; justify-content: center; opacity: 0.7; }
  .sidebar .nav-item:hover { background: rgba(255,255,255,0.04); color: #fff; }
  .sidebar .nav-item.expandable::after { content: ""; width: 5px; height: 5px; border: solid #8a8d90; border-width: 0 1.5px 1.5px 0; transform: rotate(45deg); margin-left: auto; }
  .sidebar .nav-item.expanded::after { transform: rotate(-135deg); }
  .sidebar .nav-sub { padding: 2px 0 6px; }
  .sidebar .nav-sub .nav-leaf { display: block; padding: 7px 16px 7px 44px; font-size: 13px; color: #d2d2d2; text-decoration: none; border-left: 3px solid transparent; }
  .sidebar .nav-sub .nav-leaf:hover { background: rgba(255,255,255,0.04); color: #fff; text-decoration: none; }
  .sidebar .nav-sub .nav-leaf.active { background: rgba(255,255,255,0.06); color: #fff; border-left-color: var(--brand-red); font-weight: 500; }
  .main { background: var(--bg-shell); padding: 0; min-width: 0; }

  /* ============== Page header ============== */
  .page-hdr { background: var(--bg); border-bottom: 1px solid var(--line); padding: 14px 28px 0; }
  .breadcrumb { display: flex; align-items: center; gap: 8px; font-size: 13px; color: var(--text-3); margin-bottom: 6px; }
  .breadcrumb a { color: var(--link); }
  .breadcrumb .sep { color: var(--text-3); }
  .page-title-row { display: flex; align-items: center; gap: 12px; padding-bottom: 16px; flex-wrap: wrap; }
  .page-title { font-family: var(--display); font-size: 26px; font-weight: 500; letter-spacing: -0.01em; color: var(--text); margin: 0; white-space: nowrap; }
  .page-tagline { font-size: 13px; color: var(--text-3); margin-left: 4px; }
  .page-actions { margin-left: auto; display: flex; align-items: center; gap: 8px; }
  .star-btn { width: 32px; height: 32px; display: flex; align-items: center; justify-content: center; color: var(--text-3); border-radius: var(--radius); }
  .star-btn:hover { background: var(--bg-2); color: var(--text); }
  .star-btn.starred { color: var(--warn); }

  /* ============== Content ============== */
  .content { padding: 20px 28px 64px; max-width: 1480px; }
  .content-row { display: grid; grid-template-columns: 1fr; gap: 16px; margin-bottom: 16px; }
  .card { background: var(--bg); border: 1px solid var(--line); border-radius: var(--radius); }

  /* ============== Top input strip ============== */
  .input-strip { padding: 18px 22px; }
  .input-strip-row { display: grid; grid-template-columns: 2fr 1fr auto auto; gap: 14px; align-items: end; }
  .input-field { display: flex; flex-direction: column; gap: 6px; min-width: 0; }
  .input-field-label { display: flex; align-items: center; gap: 6px; font-family: var(--mono); font-size: 11px; letter-spacing: 0.08em; text-transform: uppercase; color: var(--text-3); flex-wrap: wrap; }
  .input-field-label .hint { text-transform: none; font-family: var(--sans); letter-spacing: 0; color: var(--text-3); font-size: 11px; }
  .input-field-label .hf-mini { width: 14px; height: 14px; }
  .input-control { display: flex; align-items: stretch; border: 1px solid var(--line-2); border-radius: var(--radius); background: var(--bg); transition: border-color .15s, box-shadow .15s; }
  .input-control:focus-within { border-color: var(--action); box-shadow: 0 0 0 1px var(--action); }
  .input-control input, .input-control select { width: 100%; border: 0; padding: 9px 12px; background: transparent; font-family: var(--mono); font-size: 14px; outline: none; }
  .input-control select { font-family: var(--sans); font-weight: 500; appearance: none; padding-right: 28px; cursor: pointer; }
  .input-control.select { position: relative; }
  .input-control.select::after { content: ""; position: absolute; right: 12px; top: 50%; width: 6px; height: 6px; border: solid var(--text-2); border-width: 0 1.5px 1.5px 0; transform: translateY(-70%) rotate(45deg); pointer-events: none; }
  .input-action { display: flex; align-items: end; }
  .btn { display: inline-flex; align-items: center; gap: 8px; padding: 9px 16px; border-radius: var(--radius); font-size: 14px; font-family: var(--sans); font-weight: 500; transition: background .15s, color .15s, border-color .15s, box-shadow .15s; white-space: nowrap; }
  .btn.primary { background: var(--action); color: var(--action-text); }
  .btn.primary:hover { background: var(--action-hover); }
  .btn.primary:disabled { background: var(--bg-3); color: var(--text-3); cursor: not-allowed; }
  .btn.secondary { border: 1px solid var(--action); color: var(--action); background: var(--bg); }
  .btn.secondary:hover { background: #f0f7ff; }
  .btn.subtle { color: var(--link); padding: 9px 12px; }
  .btn.subtle:hover { background: var(--bg-2); }
  .btn.link { color: var(--link); padding: 4px 6px; text-decoration: none; }
  .btn.link:hover { text-decoration: underline; }

  /* HF fetch state badge */
  .hf-state { display: inline-flex; align-items: center; gap: 6px; padding: 2px 10px; border-radius: 999px; font-size: 12px; font-weight: 500; margin-left: 8px; white-space: nowrap; }
  .hf-state.ok { background: var(--success-bg); color: var(--success); }
  .hf-state.loading { background: var(--info-bg); color: var(--info); }
  .hf-state.err { background: var(--danger-bg); color: var(--danger); }
  .hf-state.idle { background: var(--bg-2); color: var(--text-3); }
  .hf-state .spin { width: 10px; height: 10px; border: 1.5px solid currentColor; border-right-color: transparent; border-radius: 50%; animation: spin 0.7s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ============== Hero stats (3 + 1 cost) ============== */
  .hero-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 14px; }
  .stat-tile {
    background: var(--bg);
    border: 1px solid var(--line);
    border-radius: var(--radius);
    padding: 18px 18px 16px;
    position: relative;
    cursor: pointer;
    transition: border-color .15s, box-shadow .15s, transform .15s;
    perspective: 1200px;
    min-height: 152px;
  }
  .stat-tile:hover { border-color: var(--line-2); box-shadow: 0 4px 10px rgba(0,0,0,0.06); transform: translateY(-1px); }
  .stat-tile.primary { background: #151515; border-color: #151515; color: #fff; }
  .stat-tile.primary:hover { box-shadow: 0 8px 18px rgba(238,0,0,0.18); }
  .stat-icon-wrap { width: 28px; height: 28px; border-radius: var(--radius); display: flex; align-items: center; justify-content: center; background: var(--bg-2); color: var(--text-2); margin-bottom: 12px; }
  .stat-tile.primary .stat-icon-wrap { background: rgba(255,255,255,0.10); color: #fff; }
  .stat-tile.accent-blue .stat-icon-wrap { background: #e7f1fa; color: var(--c-blue); }
  .stat-tile.accent-gold .stat-icon-wrap { background: var(--warn-bg); color: var(--c-gold); }
  .stat-tile.accent-purple .stat-icon-wrap { background: #efe9ff; color: var(--c-purple); }
  .stat-label { font-family: var(--mono); font-size: 11px; letter-spacing: 0.08em; text-transform: uppercase; color: var(--text-3); margin-bottom: 8px; }
  .stat-tile.primary .stat-label { color: rgba(255,255,255,0.7); }
  .stat-value { font-family: var(--display); font-size: 32px; font-weight: 700; letter-spacing: -0.02em; line-height: 1; display: flex; align-items: baseline; gap: 8px; color: var(--text); font-variant-numeric: tabular-nums; }
  .stat-tile.primary .stat-value { color: #fff; }
  .stat-value .unit { font-family: var(--sans); font-size: 13px; font-weight: 500; color: var(--text-3); letter-spacing: 0; }
  .stat-tile.primary .stat-value .unit { color: rgba(255,255,255,0.6); }
  .stat-value .currency { font-family: var(--sans); font-size: 18px; font-weight: 500; color: var(--text-3); margin-right: 2px; }
  .stat-tile.primary .stat-value .currency { color: rgba(255,255,255,0.6); }
  .stat-sub { font-size: 12px; color: var(--text-3); margin-top: 8px; }
  .stat-tile.primary .stat-sub { color: rgba(255,255,255,0.65); }
  .stat-chip { display: inline-flex; align-items: center; gap: 4px; font-family: var(--mono); font-size: 10px; letter-spacing: 0.05em; text-transform: uppercase; padding: 2px 7px; border-radius: 999px; background: var(--bg-2); color: var(--text-2); margin-top: 6px; }
  .stat-tile.primary .stat-chip { background: rgba(255,255,255,0.10); color: rgba(255,255,255,0.85); }
  .stat-chip.gqa { background: #e7f1fa; color: var(--c-blue); }
  .stat-chip.mha { background: #efe9ff; color: var(--c-purple); }
  .stat-chip.mqa { background: var(--success-bg); color: var(--success); }
  .stat-chip.mla { background: #fdf7e7; color: #b87b00; }
  .stat-chip.swa { background: #e8f5e8; color: var(--c-green); }

  /* ============== KV scenarios + constraints ============== */
  .kv-scen { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
  .scen-tile { padding: 12px 14px; background: var(--bg); border: 1px solid var(--line); border-left-width: 3px; border-radius: var(--radius); }
  .scen-tile.highlight { background: #fafbff; border-color: var(--line-2); }
  .scen-label { font-family: var(--mono); font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--text-3); margin-bottom: 6px; }
  .scen-value { font-family: var(--display); font-size: 22px; font-weight: 700; letter-spacing: -0.01em; line-height: 1; }
  .scen-sub { font-size: 12px; color: var(--text-3); margin-top: 6px; }
  .kv-insight { margin-top: 12px; padding: 10px 12px; background: var(--bg-2); border-left: 3px solid var(--c-blue); border-radius: var(--radius); font-size: 13px; color: var(--text-2); display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
  .kv-insight strong { color: var(--text); font-weight: 600; }
  .kv-insight > svg { flex-shrink: 0; }

  .constraint-row { display: grid; grid-template-columns: 16px 1fr auto auto; align-items: center; gap: 10px; padding: 8px 0; border-bottom: 1px dashed var(--line); }
  .constraint-row:last-of-type { border-bottom: 0; }
  .con-pip { width: 8px; height: 8px; border-radius: 50%; }
  .con-pip.ok { background: var(--success); }
  .con-pip.watch { background: var(--warn); }
  .con-pip.bottleneck { background: var(--danger); }
  .con-label { font-size: 13px; color: var(--text); }
  .con-detail { font-family: var(--mono); font-size: 11px; color: var(--text-3); white-space: nowrap; }
  .con-status { font-family: var(--mono); font-size: 10px; letter-spacing: 0.08em; text-transform: uppercase; padding: 2px 8px; border-radius: 999px; font-weight: 600; }
  .con-status.ok { background: var(--success-bg); color: var(--success); }
  .con-status.watch { background: var(--warn-bg); color: #8c5b00; }
  .con-status.bottleneck { background: var(--danger-bg); color: var(--danger); }
  .driver-row { display: flex; align-items: center; gap: 10px; padding: 12px 0 0; border-top: 1px solid var(--line); margin-top: 8px; }
  .driver-label { font-family: var(--mono); font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--text-3); }
  .driver-value { font-size: 13px; color: var(--text); font-weight: 600; margin-left: auto; }

  /* Range drivers */
  .driver-list { display: flex; flex-direction: column; gap: 8px; }
  .driver-item { display: grid; grid-template-columns: 24px minmax(0, 2fr) minmax(120px, 1fr) auto; align-items: center; gap: 14px; padding: 8px 0; border-bottom: 1px dashed var(--line); }
  .driver-item:last-child { border-bottom: 0; }
  .driver-rank { width: 24px; height: 24px; border-radius: 4px; background: var(--bg-2); color: var(--text-2); font-family: var(--mono); font-size: 11px; font-weight: 600; display: flex; align-items: center; justify-content: center; }
  .driver-name { font-size: 13px; color: var(--text); font-weight: 500; }
  .driver-reason { font-size: 11.5px; color: var(--text-3); margin-top: 2px; }
  .driver-impact { height: 6px; background: var(--bg-2); border-radius: 3px; overflow: hidden; }
  .driver-bar { height: 100%; background: linear-gradient(90deg, var(--c-blue), var(--c-purple)); transition: width .5s cubic-bezier(.4,.8,.4,1); border-radius: 3px; }
  .driver-range { font-family: var(--mono); font-size: 11px; color: var(--text-3); white-space: nowrap; }
  .stat-flip-hint { position: absolute; bottom: 8px; right: 12px; font-family: var(--mono); font-size: 9.5px; letter-spacing: 0.08em; text-transform: uppercase; color: var(--text-3); display: inline-flex; align-items: center; gap: 4px; opacity: 0.55; }
  .stat-tile.primary .stat-flip-hint { color: rgba(255,255,255,0.5); }
  .stat-tile:hover .stat-flip-hint { opacity: 1; }
  /* Sparkline on the GPU tile */
  .stat-spark { position: absolute; right: 14px; top: 14px; }
  .stat-tile.primary .stat-spark svg path { stroke: rgba(255,255,255,0.6); }

  /* Flip math face */
  .stat-back {
    position: absolute; inset: 0; padding: 18px; background: var(--bg); border-radius: var(--radius);
    opacity: 0; pointer-events: none; transform: rotateY(180deg);
    transition: opacity .25s ease, transform .45s cubic-bezier(.4,.8,.4,1);
    display: flex; flex-direction: column;
  }
  .stat-tile.primary .stat-back { background: #151515; color: #fff; }
  .stat-tile .stat-front { transition: opacity .25s ease, transform .45s cubic-bezier(.4,.8,.4,1); }
  .stat-tile.flipped .stat-front { opacity: 0; pointer-events: none; transform: rotateY(-180deg); }
  .stat-tile.flipped .stat-back { opacity: 1; pointer-events: auto; transform: rotateY(0); transition-delay: .1s, 0s; }
  .stat-back-title { font-family: var(--mono); font-size: 10px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--text-3); margin-bottom: 8px; }
  .stat-tile.primary .stat-back-title { color: rgba(255,255,255,0.5); }
  .stat-formula { font-family: var(--mono); font-size: 12px; line-height: 1.7; color: var(--text-2); }
  .stat-tile.primary .stat-formula { color: rgba(255,255,255,0.85); }
  .stat-formula .t { color: var(--link); font-weight: 500; }
  .stat-tile.primary .stat-formula .t { color: #f9a8a8; font-weight: 500; }
  .stat-formula .eq { margin-top: 6px; padding-top: 6px; border-top: 1px dashed rgba(0,0,0,0.12); }
  .stat-tile.primary .stat-formula .eq { border-top-color: rgba(255,255,255,0.22); }
  .stat-formula strong { font-weight: 700; color: var(--text); }
  .stat-tile.primary .stat-formula strong { color: #fff; }

  /* ============== Warning strip ============== */
  .warn-strip {
    display: flex; align-items: center; gap: 10px;
    padding: 10px 14px;
    background: var(--warn-bg);
    border-left: 3px solid var(--warn);
    border-radius: var(--radius);
    font-size: 13px;
    color: #5c4a00;
    margin-bottom: 16px;
  }
  .warn-strip .body { flex: 1; }
  .warn-strip .ic { color: var(--warn); flex-shrink: 0; }
  .warn-strip strong { color: #3d2f00; }
  .warn-strip .anchor { color: var(--link); font-weight: 500; white-space: nowrap; flex-shrink: 0; }
  .warn-strip .anchor:hover { text-decoration: underline; }

  /* ============== Assumption sections (accordion) ============== */
  .assumptions-hdr { display: flex; align-items: center; gap: 10px; margin: 4px 0 12px; padding: 0 2px; flex-wrap: wrap; }
  .assumptions-hdr h2 { font-family: var(--display); font-size: 18px; font-weight: 500; margin: 0; white-space: nowrap; }
  .assumptions-hdr .sub { color: var(--text-3); font-size: 13px; }
  .assumptions-grid { display: grid; grid-template-columns: 1fr; gap: 10px; }

  .acc {
    background: var(--bg);
    border: 1px solid var(--line);
    border-radius: var(--radius);
    overflow: hidden;
    transition: border-color .15s, box-shadow .15s;
  }
  .acc.open { border-color: var(--line-2); }
  .acc-hdr {
    width: 100%;
    display: grid;
    grid-template-columns: auto 1fr auto auto;
    align-items: center;
    gap: 14px;
    padding: 14px 18px;
    text-align: left;
    transition: background .15s;
  }
  .acc-hdr:hover { background: var(--bg-2); }
  .acc-icon { width: 32px; height: 32px; display: flex; align-items: center; justify-content: center; border-radius: var(--radius); background: var(--bg-2); color: var(--text-2); flex-shrink: 0; }
  .acc.open .acc-icon { background: #e7f1fa; color: var(--c-blue); }
  .acc-title { font-family: var(--display); font-size: 15px; font-weight: 500; color: var(--text); }
  .acc-title .badge { display: inline-block; font-family: var(--mono); font-size: 9.5px; letter-spacing: 0.06em; text-transform: uppercase; padding: 1px 6px; border-radius: 999px; background: var(--bg-2); color: var(--text-3); margin-left: 6px; vertical-align: middle; }
  .acc-summary { font-size: 13px; color: var(--text-3); font-family: var(--mono); display: flex; flex-wrap: wrap; gap: 4px 10px; margin-top: 4px; }
  .acc-summary .pair { white-space: nowrap; }
  .acc-summary .k { color: var(--text-3); }
  .acc-summary .v { color: var(--text); font-weight: 500; }
  .acc-edit { font-family: var(--mono); font-size: 11px; letter-spacing: 0.06em; text-transform: uppercase; color: var(--link); padding: 4px 8px; border-radius: var(--radius); display: inline-flex; align-items: center; gap: 5px; }
  .acc-edit:hover { background: var(--bg-2); }
  .acc-chev { width: 18px; height: 18px; display: flex; align-items: center; justify-content: center; color: var(--text-3); transition: transform .25s; }
  .acc.open .acc-chev { transform: rotate(180deg); color: var(--link); }

  .acc-body { display: grid; grid-template-rows: 0fr; transition: grid-template-rows .35s cubic-bezier(.4,.8,.4,1); }
  .acc.open .acc-body { grid-template-rows: 1fr; }
  .acc-body-inner { overflow: hidden; min-height: 0; }
  .acc-body-content { padding: 4px 18px 18px; border-top: 1px solid var(--line); }

  /* Field grid inside acc */
  .fields { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 16px 20px; padding-top: 16px; }
  .field { display: flex; flex-direction: column; gap: 6px; min-width: 0; }
  .field-label { font-size: 12px; color: var(--text-2); font-weight: 500; display: flex; align-items: center; gap: 6px; }
  .field-label .help { color: var(--text-3); cursor: help; }
  .field-input { display: flex; align-items: stretch; border: 1px solid var(--line); border-radius: var(--radius); background: var(--bg); transition: border-color .15s; }
  .field-input:focus-within { border-color: var(--action); box-shadow: 0 0 0 1px var(--action); }
  .field-input input, .field-input select { width: 100%; padding: 7px 10px; background: transparent; border: 0; outline: none; font-family: var(--mono); font-size: 13px; }
  .field-input select { font-family: var(--sans); cursor: pointer; padding-right: 26px; appearance: none; }
  .field-input.select { position: relative; }
  .field-input.select::after { content: ""; position: absolute; right: 10px; top: 50%; width: 6px; height: 6px; border: solid var(--text-2); border-width: 0 1.5px 1.5px 0; transform: translateY(-70%) rotate(45deg); pointer-events: none; }
  .field-suffix { padding: 7px 10px; font-family: var(--mono); font-size: 11px; color: var(--text-3); border-left: 1px solid var(--line); display: flex; align-items: center; }
  .field-help { font-size: 11px; color: var(--text-3); }
  .field-row-2 { grid-column: span 2; }

  /* Pill / chip switch */
  .pill-row { display: flex; gap: 6px; flex-wrap: wrap; }
  .pill { padding: 6px 12px; font-family: var(--mono); font-size: 12px; color: var(--text); border: 1px solid var(--line); background: var(--bg); border-radius: 999px; cursor: pointer; transition: background .15s, border-color .15s, color .15s; }
  .pill:hover { border-color: var(--text); }
  .pill.active { background: #e7f1fa; border-color: var(--action); color: var(--action); font-weight: 600; }

  /* ============== Memory layout (stacked bar) ============== */
  .layout-card .card-hdr { padding: 16px 20px 4px; display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
  .layout-card .card-title { font-family: var(--display); font-size: 16px; font-weight: 500; margin: 0; white-space: nowrap; }
  .layout-card .card-hdr .right { margin-left: auto; display: flex; align-items: center; gap: 12px; font-size: 13px; }
  .layout-body { padding: 8px 20px 20px; }
  .gpu-bar { padding: 12px 0; border-bottom: 1px dashed var(--line); }
  .gpu-bar:last-child { border-bottom: 0; }
  .gpu-bar-hdr { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 8px; gap: 10px; }
  .gpu-bar-name { font-family: var(--display); font-size: 13px; font-weight: 500; }
  .gpu-bar-name .idx { color: var(--text-3); font-family: var(--mono); margin-right: 6px; }
  .gpu-bar-meta { font-family: var(--mono); font-size: 11px; color: var(--text-2); }
  .gpu-bar-meta .util { font-weight: 600; }
  .stack { display: flex; height: 28px; border-radius: var(--radius); overflow: hidden; background: #f5f5f5; border: 1px solid var(--line); }
  .stack-seg { transition: width .5s cubic-bezier(.4,.8,.4,1); position: relative; }
  .stack-seg.weights { background: var(--c-blue); }
  .stack-seg.kv { background: var(--c-purple); }
  .stack-seg.act { background: var(--c-gold); }
  .stack-seg.headroom { background: #d2d2d2; }
  .stack-seg .lbl { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; color: #fff; font-family: var(--mono); font-size: 10px; font-weight: 600; white-space: nowrap; padding: 0 6px; overflow: hidden; }
  .stack-seg.headroom .lbl { color: var(--text-2); }

  .legend { display: flex; flex-wrap: wrap; gap: 4px 16px; margin-top: 14px; font-family: var(--mono); font-size: 11px; color: var(--text-3); }
  .legend .sw { display: inline-block; width: 10px; height: 10px; border-radius: 2px; margin-right: 6px; vertical-align: -1px; }
  .legend .sw.weights { background: var(--c-blue); }
  .legend .sw.kv { background: var(--c-purple); }
  .legend .sw.act { background: var(--c-gold); }
  .legend .sw.headroom { background: #d2d2d2; border: 1px solid var(--line); }

  /* ============== Cost composition chart ============== */
  .cost-chart { padding: 12px 0; }
  .cost-bars { display: grid; grid-template-columns: 60px 1fr 90px; gap: 12px; align-items: center; padding: 6px 0; }
  .cost-bar-label { font-family: var(--mono); font-size: 11px; color: var(--text-2); white-space: nowrap; }
  .cost-bar-track { height: 16px; background: #f5f5f5; border-radius: 2px; overflow: hidden; position: relative; }
  .cost-bar-fill { height: 100%; transition: width .6s cubic-bezier(.4,.8,.4,1); }
  .cost-bar-value { font-family: var(--mono); font-size: 12px; color: var(--text); font-weight: 500; text-align: right; white-space: nowrap; }

  /* ============== Breakdown table ============== */
  .br-table { width: 100%; border-collapse: collapse; font-size: 13px; }
  .br-table th { text-align: left; padding: 10px 14px; background: var(--bg-2); border-bottom: 1px solid var(--line); font-weight: 600; color: var(--text); font-size: 12px; }
  .br-table th.num { text-align: right; }
  .br-table td { padding: 10px 14px; border-bottom: 1px dashed var(--line); color: var(--text-2); }
  .br-table td.num { font-family: var(--mono); color: var(--text); text-align: right; font-weight: 500; }
  .br-table tr:nth-child(even) td { background: #fafafa; }
  .br-table tr.total td { border-top: 1px solid var(--line); border-bottom: 0; font-weight: 700; background: #f0f7ff !important; color: var(--text); }

  /* ============== Sparkline ============== */
  .spark { display: block; }
  .spark .area { fill: rgba(0,102,204,0.15); }
  .spark .line { stroke: var(--c-blue); stroke-width: 1.8; fill: none; }
  .stat-tile.primary .spark .area { fill: rgba(255,255,255,0.10); }
  .stat-tile.primary .spark .line { stroke: rgba(255,255,255,0.7); }
  .spark .dot { fill: var(--c-blue); }
  .stat-tile.primary .spark .dot { fill: #fff; }

  /* ============== Status badges ============== */
  .status { display: inline-flex; align-items: center; gap: 6px; font-size: 12px; padding: 2px 8px; border-radius: 999px; }
  .status.ok { background: var(--success-bg); color: var(--success); }
  .status.warn { background: var(--warn-bg); color: #8c5b00; }
  .status.info { background: var(--info-bg); color: var(--info); }
  .status .dot { width: 6px; height: 6px; border-radius: 50%; background: currentColor; }

  /* ============== Tooltip ============== */
  .helptip { display: inline-flex; align-items: center; gap: 5px; }
  .helptip-trigger { display: inline-flex; align-items: center; justify-content: center; color: var(--text-3); cursor: help; position: relative; padding: 0 1px; }
  .helptip-trigger:hover, .helptip-trigger:focus { color: var(--link); outline: none; }
  .helptip-body {
    position: absolute;
    bottom: calc(100% + 8px);
    left: 50%;
    transform: translateX(-50%) translateY(4px);
    width: 240px;
    padding: 10px 12px;
    background: #151515;
    color: #fff;
    font-family: var(--sans);
    font-size: 12px;
    font-weight: 400;
    line-height: 1.45;
    letter-spacing: 0;
    text-transform: none;
    border-radius: var(--radius);
    box-shadow: 0 6px 18px rgba(0,0,0,0.28);
    opacity: 0;
    pointer-events: none;
    transition: opacity .15s, transform .15s;
    z-index: 50;
    white-space: normal;
  }
  .helptip-body.wide { width: 300px; }
  .helptip-body.bottom { bottom: auto; top: calc(100% + 8px); }
  .helptip-body::after {
    content: "";
    position: absolute;
    top: 100%;
    left: 50%;
    transform: translateX(-50%);
    border: 6px solid transparent;
    border-top-color: #151515;
  }
  .helptip-body.bottom::after {
    top: auto;
    bottom: 100%;
    border-top-color: transparent;
    border-bottom-color: #151515;
  }
  .helptip-trigger:hover .helptip-body,
  .helptip-trigger:focus .helptip-body { opacity: 1; transform: translateX(-50%) translateY(0); pointer-events: auto; }
  /* Override flex inheritance inside dark tooltip */
  .helptip-body strong { color: #fff; font-weight: 600; }

  /* ============== Flip math wrapping ============== */
  .stat-formula { font-family: var(--mono); font-size: 12px; line-height: 1.65; color: var(--text-2); word-break: break-word; overflow-wrap: anywhere; }
  .stat-tile.primary .stat-formula { color: rgba(255,255,255,0.85); }
  .stat-back { overflow-y: auto; }

  /* ============== Footer actions ============== */
  .action-row { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; padding: 8px 0 4px; }
  .action-row .left { font-size: 13px; color: var(--text-3); display: flex; align-items: center; gap: 6px; }
  .action-row .right { margin-left: auto; display: flex; gap: 8px; }

  .copy-code {
    background: #151515;
    color: #d2d2d2;
    border-radius: var(--radius);
    padding: 14px 16px;
    font-family: var(--mono);
    font-size: 12px;
    overflow-x: auto;
    white-space: pre;
    line-height: 1.6;
  }
  .copy-code .k { color: #79c0ff; }
  .copy-code .s { color: #a5d6ff; }
  .copy-code .n { color: #ffa657; }
  .copy-code .c { color: #8b949e; }

  /* ============== Modal-ish HF token row ============== */
  .hf-token-row {
    margin-top: 14px;
    padding: 12px 14px;
    background: var(--bg-2);
    border: 1px dashed var(--line);
    border-radius: var(--radius);
  }
  .hf-token-toggle { display: inline-flex; align-items: center; gap: 6px; font-size: 12px; color: var(--link); padding: 4px 0; }
  .hf-token-toggle:hover { text-decoration: underline; }
  .hf-token-field { margin-top: 10px; display: grid; grid-template-columns: 1fr auto auto; gap: 10px; align-items: center; padding: 8px 12px; background: var(--bg); border: 1px solid var(--line); border-radius: var(--radius); }
  .hf-token-field input { border: 0; outline: none; background: transparent; font-family: var(--mono); font-size: 13px; padding: 4px 0; }
  .hf-eye { width: 28px; height: 28px; display: flex; align-items: center; justify-content: center; color: var(--text-3); border-radius: var(--radius); }
  .hf-eye:hover { color: var(--text); background: var(--bg-2); }
  .hf-token-note { margin-top: 8px; display: inline-flex; align-items: center; gap: 6px; font-family: var(--mono); font-size: 10.5px; color: var(--text-3); }

  /* ============== Toast ============== */
  .toast {
    position: fixed; bottom: 20px; right: 20px; z-index: 100;
    background: #151515; color: #fff;
    padding: 12px 16px; border-radius: var(--radius);
    font-size: 13px;
    display: flex; align-items: center; gap: 10px;
    box-shadow: 0 8px 20px rgba(0,0,0,0.25);
    animation: toastIn .3s cubic-bezier(.4,1.3,.5,1);
  }
  @keyframes toastIn { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
  .toast .ic { color: var(--success); }

  @media (max-width: 1100px) {
    .hero-grid { grid-template-columns: repeat(2, 1fr); }
    .input-strip-row { grid-template-columns: 1fr; }
  }
  @media (max-width: 860px) {
    .shell { grid-template-columns: 1fr; }
    .sidebar { display: none; }
    .hero-grid { grid-template-columns: 1fr; }
    .acc-hdr { grid-template-columns: auto 1fr auto; }
    .acc-edit { display: none; }
  }
</style>
</head>
