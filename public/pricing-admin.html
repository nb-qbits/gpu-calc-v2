<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>gpu.calc — Pricing Admin</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@400;500;600&display=swap');

*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0a0a0a;--bg2:#111;--bg3:#1a1a1a;--bg4:#222;
  --text1:#f0f0ee;--text2:#c0c0bc;--text3:#808078;--text4:#505048;
  --green:#00ff87;--green-dim:#00cc6a;--green-bg:rgba(0,255,135,.06);
  --red:#ff4444;--red-bg:rgba(255,68,68,.06);
  --amber:#ffaa00;--amber-bg:rgba(255,170,0,.06);
  --blue:#4488ff;--blue-bg:rgba(68,136,255,.06);
  --border:#2a2a2a;--border2:#333;
  --mono:'IBM Plex Mono',monospace;--sans:'IBM Plex Sans',sans-serif;
  --r:6px;--r2:10px;
}
body{font-family:var(--sans);background:var(--bg);color:var(--text1);font-size:13px;min-height:100vh}

/* ── HEADER ── */
.header{padding:20px 28px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;background:var(--bg2)}
.header-left{display:flex;align-items:center;gap:16px}
.logo{font-family:var(--mono);font-size:15px;font-weight:600;color:var(--green)}
.logo span{color:var(--text3)}
.header-title{font-size:12px;color:var(--text3);border-left:1px solid var(--border2);padding-left:16px;font-family:var(--mono)}
.status-dot{width:7px;height:7px;border-radius:50%;background:var(--text4);display:inline-block;margin-right:6px;transition:.3s}
.status-dot.live{background:var(--green);box-shadow:0 0 6px var(--green)}
.status-dot.error{background:var(--red)}

/* ── CONFIG BAR ── */
.config-bar{padding:14px 28px;background:var(--bg2);border-bottom:1px solid var(--border);display:flex;gap:10px;align-items:center;flex-wrap:wrap}
.config-label{font-size:11px;color:var(--text3);font-family:var(--mono)}
.config-input{background:var(--bg3);border:1px solid var(--border2);border-radius:var(--r);color:var(--text1);font-family:var(--mono);font-size:12px;padding:7px 12px;width:400px;outline:none;transition:.2s}
.config-input:focus{border-color:var(--green);box-shadow:0 0 0 2px rgba(0,255,135,.08)}
.btn{padding:7px 16px;border-radius:var(--r);border:none;cursor:pointer;font-family:var(--mono);font-size:12px;font-weight:600;transition:.15s}
.btn-primary{background:var(--green);color:#000}
.btn-primary:hover{background:var(--green-dim)}
.btn-ghost{background:var(--bg3);color:var(--text2);border:1px solid var(--border2)}
.btn-ghost:hover{border-color:var(--text3);color:var(--text1)}
.btn-danger{background:transparent;color:var(--red);border:1px solid var(--red);opacity:.7}
.btn-danger:hover{opacity:1;background:var(--red-bg)}
.btn:disabled{opacity:.4;cursor:not-allowed}

/* ── LAYOUT ── */
.main{display:grid;grid-template-columns:220px 1fr;min-height:calc(100vh - 100px)}
.sidebar{background:var(--bg2);border-right:1px solid var(--border);padding:16px 0}
.sidebar-section{padding:8px 16px;font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.1em;color:var(--text4);font-family:var(--mono);margin-top:8px}
.sidebar-item{padding:8px 20px;cursor:pointer;font-size:12px;font-family:var(--mono);color:var(--text3);display:flex;align-items:center;justify-content:space-between;transition:.15s;border-left:2px solid transparent}
.sidebar-item:hover{color:var(--text1);background:var(--bg3)}
.sidebar-item.active{color:var(--green);border-left-color:var(--green);background:var(--green-bg)}
.sidebar-count{font-size:10px;background:var(--bg4);padding:2px 6px;border-radius:3px;color:var(--text4);font-family:var(--mono)}
.sidebar-item.active .sidebar-count{background:rgba(0,255,135,.12);color:var(--green)}

/* ── CONTENT ── */
.content{padding:24px 28px;overflow:auto}
.content-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px;flex-wrap:wrap;gap:10px}
.content-title{font-size:16px;font-weight:600;font-family:var(--mono)}
.content-sub{font-size:11px;color:var(--text3);margin-top:2px}

/* ── STAT CARDS ── */
.stat-row{display:grid;grid-template-columns:repeat(5,1fr);gap:10px;margin-bottom:20px}
.stat-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r2);padding:14px 16px}
.stat-card-val{font-size:22px;font-weight:600;font-family:var(--mono);line-height:1}
.stat-card-lbl{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.07em;margin-top:5px}
.stat-card.green .stat-card-val{color:var(--green)}
.stat-card.red .stat-card-val{color:var(--red)}
.stat-card.amber .stat-card-val{color:var(--amber)}
.stat-card.blue .stat-card-val{color:var(--blue)}

/* ── FILTERS ── */
.filters{display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap;align-items:center}
.filter-chip{padding:5px 12px;border-radius:20px;border:1px solid var(--border2);background:transparent;color:var(--text3);cursor:pointer;font-size:11px;font-family:var(--mono);transition:.15s}
.filter-chip:hover{border-color:var(--text3);color:var(--text2)}
.filter-chip.on{background:var(--green-bg);border-color:var(--green);color:var(--green)}
.search-input{background:var(--bg3);border:1px solid var(--border2);border-radius:var(--r);color:var(--text1);font-family:var(--mono);font-size:12px;padding:6px 12px;width:200px;outline:none}
.search-input:focus{border-color:var(--green)}

/* ── TABLE ── */
.table-wrap{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r2);overflow:hidden}
table{width:100%;border-collapse:collapse;font-size:12px}
thead tr{background:var(--bg3)}
th{padding:9px 14px;text-align:left;font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.08em;color:var(--text4);font-family:var(--mono);white-space:nowrap;cursor:pointer;user-select:none;border-bottom:1px solid var(--border)}
th:hover{color:var(--text2)}
th.sorted{color:var(--green)}
td{padding:9px 14px;border-bottom:1px solid var(--border);font-family:var(--mono);vertical-align:middle}
tr:last-child td{border-bottom:none}
tr:hover td{background:var(--bg3)}
.mono{font-family:var(--mono)}
.price-val{font-weight:600;color:var(--green)}
.price-secondary{color:var(--text3);font-size:10px}

/* ── BADGES ── */
.badge{display:inline-block;font-size:9px;padding:2px 7px;border-radius:3px;font-weight:600;text-transform:uppercase;letter-spacing:.05em;font-family:var(--mono)}
.badge-green{background:var(--green-bg);color:var(--green);border:1px solid rgba(0,255,135,.2)}
.badge-red{background:var(--red-bg);color:var(--red);border:1px solid rgba(255,68,68,.2)}
.badge-amber{background:var(--amber-bg);color:var(--amber);border:1px solid rgba(255,170,0,.2)}
.badge-blue{background:var(--blue-bg);color:var(--blue);border:1px solid rgba(68,136,255,.2)}
.badge-dim{background:var(--bg3);color:var(--text4);border:1px solid var(--border)}

/* ── PROVIDER DOT ── */
.pdot{display:inline-block;width:7px;height:7px;border-radius:50%;margin-right:6px;vertical-align:middle}

/* ── ALERTS ── */
.alert-card{background:var(--bg2);border:1px solid var(--amber);border-radius:var(--r2);padding:16px 18px;margin-bottom:10px;display:flex;align-items:center;justify-content:space-between;gap:12px}
.alert-card.down{border-color:var(--green)}
.alert-info{flex:1}
.alert-title{font-size:13px;font-weight:600;font-family:var(--mono);margin-bottom:3px}
.alert-reason{font-size:11px;color:var(--text3)}
.alert-price{text-align:right;white-space:nowrap}
.alert-change{font-size:18px;font-weight:700;font-family:var(--mono)}
.alert-btns{display:flex;gap:6px}

/* ── RUN LOG ── */
.run-row{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:12px 16px;margin-bottom:8px;display:flex;align-items:center;gap:16px;font-family:var(--mono);font-size:12px}
.run-id{color:var(--text4);font-size:10px;flex:1}
.run-stat{text-align:center;min-width:50px}
.run-stat-val{font-size:14px;font-weight:600}
.run-stat-lbl{font-size:9px;color:var(--text4);text-transform:uppercase}
.run-time{color:var(--text3);font-size:11px;white-space:nowrap}

/* ── LOADING / EMPTY ── */
.loading{display:flex;align-items:center;justify-content:center;padding:60px;color:var(--text4);font-family:var(--mono);font-size:12px;gap:10px}
.spinner{width:16px;height:16px;border:2px solid var(--border2);border-top-color:var(--green);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.empty{padding:60px;text-align:center;color:var(--text4);font-family:var(--mono);font-size:12px}

/* ── SOURCE LINK ── */
.src-link{color:var(--text4);font-size:10px;text-decoration:none}
.src-link:hover{color:var(--blue)}

/* ── RUN TRIGGER ── */
.run-panel{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r2);padding:18px 20px;margin-bottom:20px}
.run-panel-title{font-size:12px;font-weight:600;font-family:var(--mono);color:var(--text2);margin-bottom:12px}
.source-grid{display:grid;grid-template-columns:repeat(6,1fr);gap:8px;margin-bottom:14px}
.source-btn{padding:8px;border:1px solid var(--border2);border-radius:var(--r);background:transparent;color:var(--text3);cursor:pointer;font-family:var(--mono);font-size:11px;text-align:center;transition:.15s}
.source-btn:hover{border-color:var(--green);color:var(--green);background:var(--green-bg)}
.source-btn.selected{border-color:var(--green);color:var(--green);background:var(--green-bg)}
.source-btn .src-status{font-size:9px;margin-top:3px;color:var(--text4)}
.source-btn.ok .src-status{color:var(--green)}
.source-btn.error .src-status{color:var(--red)}

@media(max-width:900px){
  .main{grid-template-columns:1fr}
  .sidebar{display:none}
  .stat-row{grid-template-columns:repeat(3,1fr)}
}
</style>
</head>
<body>

<!-- HEADER -->
<div class="header">
  <div class="header-left">
    <div class="logo">gpu<span>.calc</span></div>
    <div class="header-title"><span class="status-dot" id="status-dot"></span>pricing admin</div>
  </div>
  <div style="display:flex;align-items:center;gap:10px;font-family:var(--mono);font-size:11px;color:var(--text3)" id="last-run-label">
    connecting...
  </div>
</div>

<!-- CONFIG BAR -->
<div class="config-bar">
  <span class="config-label">WORKER URL</span>
  <input class="config-input" id="worker-url" type="text"
    placeholder="https://gpu-pricing-worker.YOUR.workers.dev"
    value="https://gpu-pricing-worker.vikasgrover2004.workers.dev">
  <span class="config-label" style="margin-left:8px">ADMIN TOKEN</span>
  <input class="config-input" id="admin-token" type="password"
    placeholder="your admin secret" style="width:220px"
    value="">
  <button class="btn btn-primary" onclick="connect()">Connect</button>
  <button class="btn btn-ghost" onclick="clearData()">Clear</button>
</div>

<!-- MAIN LAYOUT -->
<div class="main">

  <!-- SIDEBAR -->
  <div class="sidebar">
    <div class="sidebar-section">Database</div>
    <div class="sidebar-item active" onclick="showView('all-prices',this)">
      All Prices <span class="sidebar-count" id="cnt-all">—</span>
    </div>
    <div class="sidebar-item" onclick="showView('gpu-cloud',this)">
      GPU Cloud <span class="sidebar-count" id="cnt-gpu">—</span>
    </div>
    <div class="sidebar-item" onclick="showView('api-tokens',this)">
      API Tokens <span class="sidebar-count" id="cnt-api">—</span>
    </div>

    <div class="sidebar-section">Confidence</div>
    <div class="sidebar-item" onclick="showView('high-conf',this)">
      High (API) <span class="sidebar-count" id="cnt-high">—</span>
    </div>
    <div class="sidebar-item" onclick="showView('med-conf',this)">
      Medium (scrape) <span class="sidebar-count" id="cnt-med">—</span>
    </div>
    <div class="sidebar-item" onclick="showView('low-conf',this)">
      Low (known) <span class="sidebar-count" id="cnt-low">—</span>
    </div>

    <div class="sidebar-section">Actions</div>
    <div class="sidebar-item" onclick="showView('pending',this)">
      Pending Review <span class="sidebar-count" id="cnt-pending" style="background:rgba(255,170,0,.15);color:var(--amber)">—</span>
    </div>
    <div class="sidebar-item" onclick="showView('run-log',this)">
      Run History <span class="sidebar-count" id="cnt-runs">—</span>
    </div>
    <div class="sidebar-item" onclick="showView('trigger',this)">
      Trigger Run <span class="sidebar-count" style="background:var(--green-bg);color:var(--green)">▶</span>
    </div>
  </div>

  <!-- CONTENT -->
  <div class="content">
    <div id="view-all-prices"></div>
    <div id="view-gpu-cloud" style="display:none"></div>
    <div id="view-api-tokens" style="display:none"></div>
    <div id="view-high-conf" style="display:none"></div>
    <div id="view-med-conf" style="display:none"></div>
    <div id="view-low-conf" style="display:none"></div>
    <div id="view-pending" style="display:none"></div>
    <div id="view-run-log" style="display:none"></div>
    <div id="view-trigger" style="display:none"></div>
  </div>
</div>

<script>
// ═══ STATE ═══════════════════════════════════════════════
let ALL_PRICES = [];
let ALERTS = [];
let RUNS = [];
let STATUS = {};
let currentView = 'all-prices';
let sortCol = 3; // price col
let sortAsc = true;
let filterGPU = 'all';
let searchTerm = '';

const PC = {
  AWS:'#FF9900',GCP:'#4285F4',Azure:'#0078D4',
  Lambda:'#7C3AED',CoreWeave:'#E63946',RunPod:'#2EC4B6',
  'Vast.ai':'#F59E0B',Anthropic:'#D97706',OpenAI:'#10A37F',
  Google:'#34A853',Mistral:'#6366F1',Groq:'#EF4444',
};

// ═══ CONNECT ═════════════════════════════════════════════
async function connect(){
  const url = document.getElementById('worker-url').value.trim().replace(/\/$/, '');
  const token = document.getElementById('admin-token').value.trim();

  if(!url){ alert('Enter Worker URL'); return; }

  setStatus('connecting');
  document.getElementById('last-run-label').textContent = 'Loading...';

  try {
    // Load all data in parallel
    const headers = token ? { 'X-Admin-Token': token } : {};
    const [pricesResp, statusResp, alertsResp] = await Promise.all([
      fetch(`${url}/prices`, { headers }),
      fetch(`${url}/status`, { headers }),
      token ? fetch(`${url}/validate`, { headers }) : Promise.resolve(null),
    ]);

    if(!pricesResp.ok) throw new Error(`Prices API returned ${pricesResp.status}`);

    const pricesData = await pricesResp.json();
    ALL_PRICES = pricesData.prices || [];

    const statusData = await statusResp.json();
    STATUS = statusData;
    RUNS = statusData.recent_runs || [];

    if(alertsResp && alertsResp.ok){
      const alertsData = await alertsResp.json();
      ALERTS = alertsData.alerts || [];
    }

    setStatus('live');
    updateSidebar();
    renderCurrentView();

    // Update last run label
    const lastRun = RUNS[0];
    if(lastRun){
      const ago = Math.round((Date.now() - new Date(lastRun.started_at).getTime()) / 60000);
      document.getElementById('last-run-label').textContent =
        `Last run: ${ago < 60 ? ago+'m ago' : Math.round(ago/60)+'h ago'} · ${lastRun.records_fetched} fetched · ${lastRun.records_updated} updated`;
    }

  } catch(err){
    setStatus('error');
    document.getElementById('last-run-label').textContent = 'Error: ' + err.message;
    alert('Connection failed: ' + err.message);
  }
}

function setStatus(s){
  const dot = document.getElementById('status-dot');
  dot.className = 'status-dot ' + (s === 'live' ? 'live' : s === 'error' ? 'error' : '');
}

// ═══ SIDEBAR COUNTS ══════════════════════════════════════
function updateSidebar(){
  const gpu = ALL_PRICES.filter(p => p.category === 'gpu_cloud');
  const api = ALL_PRICES.filter(p => p.category === 'api_token');
  const high = ALL_PRICES.filter(p => p.confidence === 'high');
  const med = ALL_PRICES.filter(p => p.confidence === 'medium');
  const low = ALL_PRICES.filter(p => p.confidence === 'low');

  document.getElementById('cnt-all').textContent = ALL_PRICES.length;
  document.getElementById('cnt-gpu').textContent = gpu.length;
  document.getElementById('cnt-api').textContent = api.length;
  document.getElementById('cnt-high').textContent = high.length;
  document.getElementById('cnt-med').textContent = med.length;
  document.getElementById('cnt-low').textContent = low.length;
  document.getElementById('cnt-pending').textContent = ALERTS.length || '0';
  document.getElementById('cnt-runs').textContent = RUNS.length;
}

// ═══ VIEW ROUTING ════════════════════════════════════════
function showView(view, el){
  document.querySelectorAll('.sidebar-item').forEach(i => i.classList.remove('active'));
  if(el) el.classList.add('active');
  document.querySelectorAll('[id^="view-"]').forEach(v => v.style.display = 'none');
  document.getElementById('view-'+view).style.display = 'block';
  currentView = view;
  renderView(view);
}

function renderCurrentView(){ renderView(currentView); }

function renderView(view){
  if(view === 'all-prices')  renderPriceTable(ALL_PRICES, 'view-all-prices', 'All Prices', ALL_PRICES.length + ' records');
  if(view === 'gpu-cloud')   renderPriceTable(ALL_PRICES.filter(p=>p.category==='gpu_cloud'), 'view-gpu-cloud', 'GPU Cloud Prices');
  if(view === 'api-tokens')  renderApiTable(ALL_PRICES.filter(p=>p.category==='api_token'), 'view-api-tokens');
  if(view === 'high-conf')   renderPriceTable(ALL_PRICES.filter(p=>p.confidence==='high'), 'view-high-conf', 'High Confidence Prices', 'From machine-readable APIs');
  if(view === 'med-conf')    renderPriceTable(ALL_PRICES.filter(p=>p.confidence==='medium'), 'view-med-conf', 'Medium Confidence Prices', 'From HTML scraping');
  if(view === 'low-conf')    renderPriceTable(ALL_PRICES.filter(p=>p.confidence==='low'), 'view-low-conf', 'Low Confidence Prices', 'Manually verified / fallback');
  if(view === 'pending')     renderPending();
  if(view === 'run-log')     renderRunLog();
  if(view === 'trigger')     renderTrigger();
}

// ═══ PRICE TABLE ═════════════════════════════════════════
function renderPriceTable(prices, containerId, title, subtitle){
  const el = document.getElementById(containerId);
  if(!prices.length){
    el.innerHTML = `<div class="content-header"><div><div class="content-title">${title}</div></div></div><div class="empty">No data — connect to your Worker first</div>`;
    return;
  }

  // Filter + search
  let filtered = prices;
  if(searchTerm) filtered = filtered.filter(p =>
    (p.provider||'').toLowerCase().includes(searchTerm) ||
    (p.gpu||'').toLowerCase().includes(searchTerm) ||
    (p.model||'').toLowerCase().includes(searchTerm) ||
    (p.id||'').toLowerCase().includes(searchTerm)
  );

  // Sort
  filtered = [...filtered].sort((a,b) => {
    const cols = ['provider','gpu','vram_gb','price_usd','pricing_type','confidence','fetched_at'];
    const col = cols[sortCol] || 'price_usd';
    const av = a[col] || 0, bv = b[col] || 0;
    if(typeof av === 'string') return sortAsc ? av.localeCompare(bv) : bv.localeCompare(av);
    return sortAsc ? av - bv : bv - av;
  });

  // GPU filter chips
  const gpus = [...new Set(prices.filter(p=>p.gpu).map(p=>p.gpu))].sort();
  const providers = [...new Set(prices.map(p=>p.provider))].sort();

  el.innerHTML = `
    <div class="content-header">
      <div>
        <div class="content-title">${title}</div>
        <div class="content-sub">${subtitle || filtered.length + ' of ' + prices.length + ' records'}</div>
      </div>
      <div style="display:flex;gap:8px">
        <input class="search-input" placeholder="Search..." oninput="searchTerm=this.value.toLowerCase();renderView('${containerId.replace('view-','')}')">
        <button class="btn btn-ghost" onclick="exportCSV()">Export CSV</button>
      </div>
    </div>

    <div class="filters" style="margin-bottom:16px">
      ${gpus.map(g=>`<button class="filter-chip ${filterGPU===g?'on':''}" onclick="filterGPU='${g}';renderView('${containerId.replace('view-','')}')">
        ${g}</button>`).join('')}
      ${filterGPU!=='all'?`<button class="filter-chip on" onclick="filterGPU='all';renderView('${containerId.replace('view-','')}')">× clear</button>`:''}
    </div>

    <div class="table-wrap">
      <table>
        <thead><tr>
          <th onclick="srt(0)">Provider ${sortCol===0?(sortAsc?'↑':'↓'):''}</th>
          <th onclick="srt(1)">GPU / Model ${sortCol===1?(sortAsc?'↑':'↓'):''}</th>
          <th onclick="srt(2)">VRAM ${sortCol===2?(sortAsc?'↑':'↓'):''}</th>
          <th onclick="srt(3)">Price ${sortCol===3?(sortAsc?'↑':'↓'):''}</th>
          <th>Type</th>
          <th>Region</th>
          <th onclick="srt(5)">Confidence ${sortCol===5?(sortAsc?'↑':'↓'):''}</th>
          <th onclick="srt(6)">Fetched ${sortCol===6?(sortAsc?'↑':'↓'):''}</th>
          <th>Source</th>
        </tr></thead>
        <tbody>
          ${filtered
            .filter(p => filterGPU==='all' || p.gpu===filterGPU)
            .map(p => `
            <tr>
              <td><span class="pdot" style="background:${PC[p.provider]||'#888'}"></span>${p.provider}</td>
              <td style="font-weight:500">${p.gpu || p.model || '—'}</td>
              <td>${p.vram_gb ? p.vram_gb+'GB' : '—'}</td>
              <td>
                <span class="price-val">$${p.price_usd?.toFixed(p.price_usd < 1 ? 4 : 2)}</span>
                <div class="price-secondary">${formatUnit(p.unit)}</div>
              </td>
              <td>${pricingBadge(p.pricing_type)}</td>
              <td style="color:var(--text3);font-size:11px">${p.region || 'global'}</td>
              <td>${confBadge(p.confidence)}</td>
              <td style="color:var(--text3);font-size:10px">${formatDate(p.fetched_at)}</td>
              <td><a href="${p.source_url}" target="_blank" class="src-link" title="${p.source_url}">↗</a></td>
            </tr>`).join('')}
        </tbody>
      </table>
    </div>`;
}

// ═══ API TOKEN TABLE ═════════════════════════════════════
function renderApiTable(prices, containerId){
  const el = document.getElementById(containerId);

  // Group by model — pair input/output
  const models = {};
  prices.forEach(p => {
    const key = `${p.provider}||${p.model}`;
    if(!models[key]) models[key] = { provider: p.provider, model: p.model, fetched_at: p.fetched_at, source_url: p.source_url, confidence: p.confidence };
    if(p.unit?.includes('input'))  models[key].input  = p.price_usd;
    if(p.unit?.includes('output')) models[key].output = p.price_usd;
  });

  const rows = Object.values(models).sort((a,b) => (a.input||0) - (b.input||0));

  el.innerHTML = `
    <div class="content-header">
      <div>
        <div class="content-title">API Token Prices</div>
        <div class="content-sub">${rows.length} models · $/1M tokens</div>
      </div>
    </div>
    <div class="table-wrap">
      <table>
        <thead><tr>
          <th>Provider</th>
          <th>Model</th>
          <th>Input $/1M</th>
          <th>Output $/1M</th>
          <th>Output:Input ratio</th>
          <th>Confidence</th>
          <th>Fetched</th>
          <th>Source</th>
        </tr></thead>
        <tbody>
          ${rows.map(r => `
          <tr>
            <td><span class="pdot" style="background:${PC[r.provider]||'#888'}"></span>${r.provider}</td>
            <td style="font-weight:500">${r.model}</td>
            <td><span class="price-val">$${r.input?.toFixed(3) || '—'}</span></td>
            <td><span style="color:var(--amber)">$${r.output?.toFixed(3) || '—'}</span></td>
            <td style="color:var(--text3)">${r.input && r.output ? Math.round(r.output/r.input)+'×' : '—'}</td>
            <td>${confBadge(r.confidence)}</td>
            <td style="color:var(--text3);font-size:10px">${formatDate(r.fetched_at)}</td>
            <td><a href="${r.source_url}" target="_blank" class="src-link">↗</a></td>

        </tbody>

}

// ═══ PENDING ALERTS ══════════════════════════════════════
function renderPending(){
  const el = document.getElementById('view-pending');
  if(!ALERTS.length){
    el.innerHTML = `<div class="content-header"><div><div class="content-title">Pending Review</div><div class="content-sub">Price changes requiring confirmation</div></div></div>
    <div style="text-align:center;padding:60px;font-family:var(--mono);font-size:13px;color:var(--green)">✓ No pending items — all prices confirmed</div>`;
    return;
  }
  el.innerHTML = `
    <div class="content-header">
      <div>
        <div class="content-title">Pending Review</div>
        <div class="content-sub">${ALERTS.length} price changes need your confirmation</div>
      </div>
      <button class="btn btn-primary" onclick="confirmAll()">Confirm All</button>
    </div>
    ${ALERTS.map(a => {
      const chg = a.change_pct || 0;
      const isDown = a.new_price < (a.old_price || 0);
      return `
      <div class="alert-card ${isDown?'down':''}">
        <div class="alert-info">
          <div class="alert-title">${a.provider} · ${a.gpu || a.model || a.price_id}</div>
          <div class="alert-reason">${a.reason || 'Price change flagged for review'}</div>
          <div style="font-size:10px;color:var(--text4);margin-top:4px;font-family:var(--mono)">${a.price_id}</div>
        </div>
        <div class="alert-price">
          <div class="alert-change" style="color:${isDown?'var(--green)':'var(--amber)'}">
            ${isDown?'▼':'▲'} ${Math.abs(chg).toFixed(0)}%
          </div>
          <div style="font-size:11px;color:var(--text3);font-family:var(--mono)">
            $${a.old_price?.toFixed(3)||'?'} → $${a.new_price?.toFixed(3)||'?'}
          </div>
        </div>
        <div class="alert-btns">
          <button class="btn btn-primary" onclick="resolveAlert(${a.id},'confirm',this)">Confirm</button>
          <button class="btn btn-danger" onclick="resolveAlert(${a.id},'reject',this)">Reject</button>
        </div>
      </div>`;
    }).join('')}`;
}

async function resolveAlert(id, action, btn){
  const url = document.getElementById('worker-url').value.trim().replace(/\/$/, '');
  const token = document.getElementById('admin-token').value.trim();
  if(!token){ alert('Enter admin token'); return; }
  btn.disabled = true;
  btn.textContent = '...';
  try {
    const resp = await fetch(`${url}/validate/${id}`, {
      method: 'POST',
      headers: { 'X-Admin-Token': token, 'Content-Type': 'application/json' },
      body: JSON.stringify({ action }),
    });
    const data = await resp.json();
    if(data.success){
      ALERTS = ALERTS.filter(a => a.id !== id);
      document.getElementById('cnt-pending').textContent = ALERTS.length || '0';
      renderPending();
    }
  } catch(e){ btn.disabled=false; btn.textContent=action; }
}

async function confirmAll(){
  const url = document.getElementById('worker-url').value.trim().replace(/\/$/, '');
  const token = document.getElementById('admin-token').value.trim();
  if(!token){ alert('Enter admin token'); return; }
  for(const a of ALERTS){
    await fetch(`${url}/validate/${a.id}`, {
      method:'POST',
      headers:{'X-Admin-Token':token,'Content-Type':'application/json'},
      body:JSON.stringify({action:'confirm'}),
    });
  }
  ALERTS = [];
  document.getElementById('cnt-pending').textContent = '0';
  renderPending();
}

// ═══ RUN LOG ═════════════════════════════════════════════
function renderRunLog(){
  const el = document.getElementById('view-run-log');
  el.innerHTML = `
    <div class="content-header">
      <div>
        <div class="content-title">Run History</div>
        <div class="content-sub">Last ${RUNS.length} collection runs</div>
      </div>
    </div>
    ${!RUNS.length ? '<div class="empty">No runs yet</div>' :
    RUNS.map(r => {

        <div class="run-stat"><div class="run-stat-val" style="color:var(--green)">${r.records_updated||0}</div><div class="run-stat-lbl">updated</div></div>

        <div class="run-stat"><div class="run-stat-val" style="color:${errors.length?'var(--red)':'var(--text4)'}">${errors.length}</div><div class="run-stat-lbl">errors</div></div>
        <div class="run-stat"><div class="run-stat-val" style="color:var(--text3)">${dur?dur+'s':'—'}</div><div class="run-stat-lbl">duration</div></div>

// ═══ TRIGGER RUN ═════════════════════════════════════════
function renderTrigger(){
  const el = document.getElementById('view-trigger');
  const sources = ['aws','gcp','azure','vastai','api_tokens','specialists'];
  el.innerHTML = `
    <div class="content-header">
      <div>
        <div class="content-title">Trigger Collection Run</div>
        <div class="content-sub">Manually run collectors to fetch fresh prices</div>
      </div>
    </div>
    <div class="run-panel">
      <div class="run-panel-title">SELECT SOURCES TO RUN</div>
      <div class="source-grid">
        ${sources.map(s => {
          const lastRun = RUNS[0];
          const hasErr = lastRun && lastRun.errors && lastRun.errors.includes(s);
          return `<div class="source-btn ${hasErr?'error':'ok'} selected" id="src-${s}" onclick="this.classList.toggle('selected')">
            ${s}
            <div class="src-status">${hasErr?'last error':'✓ ok'}</div>
          </div>`;
        }).join('')}
      </div>
      <div style="display:flex;gap:10px;align-items:center">
        <button class="btn btn-primary" onclick="triggerRun()" id="run-btn">▶ Run Now</button>
        <button class="btn btn-ghost" onclick="document.querySelectorAll('.source-btn').forEach(b=>b.classList.add('selected'))">Select All</button>
        <span style="font-family:var(--mono);font-size:11px;color:var(--text4)">Admin token required</span>
      </div>
      <div id="run-output" style="margin-top:16px"></div>
    </div>`;
}

async function triggerRun(){
  const url = document.getElementById('worker-url').value.trim().replace(/\/$/, '');
  const token = document.getElementById('admin-token').value.trim();
  if(!token){ alert('Enter admin token first'); return; }

  const selected = [...document.querySelectorAll('.source-btn.selected')].map(b=>b.id.replace('src-',''));
  if(!selected.length){ alert('Select at least one source'); return; }

  const btn = document.getElementById('run-btn');
  const output = document.getElementById('run-output');
  btn.disabled = true;
  btn.textContent = '⟳ Running...';
  output.innerHTML = `<div class="loading"><div class="spinner"></div>Fetching prices from ${selected.join(', ')}...</div>`;

  try {
    const resp = await fetch(`${url}/run?sources=${selected.join(',')}`, {
      method: 'POST',
      headers: { 'X-Admin-Token': token },
    });
    const data = await resp.json();
    btn.disabled = false;
    btn.textContent = '▶ Run Now';

    output.innerHTML = `
      <div style="background:var(--bg3);border:1px solid var(--border);border-radius:var(--r);padding:16px;font-family:var(--mono);font-size:12px">
        <div style="color:var(--green);margin-bottom:12px;font-size:13px">✓ Run completed in ${(data.duration_ms/1000).toFixed(1)}s</div>
        <div style="display:grid;grid-template-columns:repeat(5,1fr);gap:10px;margin-bottom:12px">
          <div><div style="font-size:18px;font-weight:600">${data.prices_fetched||0}</div><div style="font-size:10px;color:var(--text4);text-transform:uppercase">fetched</div></div>
          <div><div style="font-size:18px;font-weight:600;color:var(--green)">${data.prices_approved||0}</div><div style="font-size:10px;color:var(--text4);text-transform:uppercase">approved</div></div>
          <div><div style="font-size:18px;font-weight:600;color:var(--amber)">${data.prices_pending||0}</div><div style="font-size:10px;color:var(--text4);text-transform:uppercase">pending</div></div>
          <div><div style="font-size:18px;font-weight:600;color:var(--text4)">${data.prices_rejected||0}</div><div style="font-size:10px;color:var(--text4);text-transform:uppercase">rejected</div></div>
          <div><div style="font-size:18px;font-weight:600;color:var(--text4)">${data.prices_unchanged||0}</div><div style="font-size:10px;color:var(--text4);text-transform:uppercase">unchanged</div></div>
        </div>
        ${data.error_details?.length ? `<div style="color:var(--red);font-size:11px">${data.error_details.map(e=>`✗ ${e.source}: ${e.error}`).join('<br>')}</div>` : '<div style="color:var(--green);font-size:11px">✓ No errors</div>'}
      </div>`;

    // Refresh data
    await connect();
  } catch(e){
    btn.disabled = false;
    btn.textContent = '▶ Run Now';
    output.innerHTML = `<div style="color:var(--red);font-family:var(--mono);font-size:12px">Error: ${e.message}</div>`;
  }
}

// ═══ HELPERS ════════════════════════════════════════════
function srt(col){
  if(sortCol === col) sortAsc = !sortAsc;
  else { sortCol = col; sortAsc = true; }
  renderCurrentView();
}

function formatUnit(unit){
  if(!unit) return '';
  if(unit.includes('gpu_hour')) return '/GPU·hr';
  if(unit.includes('instance_hour')) return '/instance·hr';
  if(unit.includes('input')) return '/1M input';
  if(unit.includes('output')) return '/1M output';
  return unit;
}

function formatDate(iso){
  if(!iso) return '—';
  const d = new Date(iso);
  const now = new Date();
  const diffH = Math.round((now - d) / 3600000);
  if(diffH < 1) return 'just now';
  if(diffH < 24) return diffH + 'h ago';
  return Math.round(diffH/24) + 'd ago';
}

function confBadge(c){
  if(c === 'high')   return '<span class="badge badge-green">API</span>';
  if(c === 'medium') return '<span class="badge badge-amber">scrape</span>';
  if(c === 'low')    return '<span class="badge badge-dim">known</span>';
  return '<span class="badge badge-dim">'+c+'</span>';
}

function pricingBadge(t){
  if(t === 'on_demand')  return '<span class="badge badge-blue">on-demand</span>';
  if(t === 'reserved' || t === 'reserved_1yr') return '<span class="badge badge-green">reserved</span>';
  if(t === 'spot' || t === 'spot_median') return '<span class="badge badge-amber">spot</span>';
  if(t === 'api')        return '<span class="badge badge-dim">api</span>';
  return '<span class="badge badge-dim">'+(t||'—')+'</span>';
}

function exportCSV(){
  const headers = ['id','provider','gpu','model','vram_gb','pricing_type','price_usd','unit','region','confidence','fetched_at','source_url'];
  const rows = ALL_PRICES.map(p => headers.map(h => JSON.stringify(p[h]||'')).join(','));
  const csv = [headers.join(','), ...rows].join('\n');
  const a = document.createElement('a');
  a.href = 'data:text/csv,' + encodeURIComponent(csv);
  a.download = 'gpu-prices-' + new Date().toISOString().slice(0,10) + '.csv';
  a.click();
}

function clearData(){
  ALL_PRICES = []; ALERTS = []; RUNS = []; STATUS = {};
  updateSidebar();
  renderCurrentView();
  setStatus('');
  document.getElementById('last-run-label').textContent = 'disconnected';
}

// Auto-connect on load if URL is prefilled
window.addEventListener('load', () => {
  const url = document.getElementById('worker-url').value;
  if(url && url !== 'https://gpu-pricing-worker.YOUR.workers.dev') {
    // Wait for token input
  }
  // Render empty state
  renderView('all-prices');
});
</script>
